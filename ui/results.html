// UI
// ============================================================
function setupUI() {
  buildResultTabs();
  buildSidebar();

  // Apply voltage display visibility based on result type
  const isAll = isShowingAllNetworks();
  const vEl = document.getElementById('st-voltage');
  const dEl = document.getElementById('st-delta');
  _log('UI', 'isShowingAllNetworks=' + isAll + ' vEl.classList=' + (vEl?.classList?.value || 'null'));
  if (isAll) {
    vEl?.classList.add('hidden');
    dEl?.classList.add('hidden');
    _log('UI', 'HIDING voltage display (all networks mode), vEl.classList=' + (vEl?.classList?.value || 'null'));
  } else {
    vEl?.classList.remove('hidden');
    dEl?.classList.remove('hidden');
    _log('UI', 'SHOWING voltage display (single network mode)');
  }

  document.getElementById('btn-edges').addEventListener('click', () => { showEdges = !showEdges; updateToggles(); render(); });
  document.getElementById('btn-outline').addEventListener('click', () => { showOutline = !showOutline; updateToggles(); render(); });
  document.getElementById('btn-vias').addEventListener('click', () => { showVias = !showVias; updateToggles(); render(); });
  document.getElementById('btn-flow').addEventListener('click', () => {
    showCurrentFlow = !showCurrentFlow;
    updateToggles();
    // 显示/隐藏箭头密度与大小控制
    const densitySelect = document.getElementById('arrow-density');
    if (densitySelect) {
      densitySelect.style.display = showCurrentFlow ? 'inline-block' : 'none';
    }
    const sizeControl = document.getElementById('arrow-size-control');
    if (sizeControl) {
      sizeControl.style.display = showCurrentFlow ? 'flex' : 'none';
    }
    render();
  });
  document.getElementById('btn-viewmode').addEventListener('click', toggleViewMode);
  document.getElementById('btn-gndpower').addEventListener('click', () => {
    currentViewMode = currentViewMode === 'gnd_power' ? 'voltage' : 'gnd_power';
    document.getElementById('btn-viewmode').classList.toggle('active', currentViewMode === 'power');
    document.getElementById('btn-gndpower').classList.toggle('active', currentViewMode === 'gnd_power');
    document.getElementById('btn-copper').classList.toggle('active', currentViewMode === 'copper_coverage');
    drawColorbar(); updateInfoPanel(); render();
  });
  const btnWarn = document.getElementById('btn-warn');
  if (btnWarn) {
    btnWarn.addEventListener('click', () => { showWarning(); });
  }
  document.getElementById('btn-copper').addEventListener('click', () => {
    currentViewMode = currentViewMode === 'copper_coverage' ? 'voltage' : 'copper_coverage';
    document.getElementById('btn-viewmode').classList.toggle('active', currentViewMode === 'power');
    document.getElementById('btn-gndpower').classList.toggle('active', currentViewMode === 'gnd_power');
    document.getElementById('btn-copper').classList.toggle('active', currentViewMode === 'copper_coverage');
    drawColorbar(); updateInfoPanel(); render();
  });
  document.getElementById('btn-reset').addEventListener('click', () => { resetView(); render(); });

  // 箭头密度控制
  const arrowDensitySelect = document.getElementById('arrow-density');
  if (arrowDensitySelect) {
    arrowDensitySelect.addEventListener('change', (e) => {
      arrowDensityLevel = parseFloat(e.target.value);
      console.log('[Results] Arrow density changed to:', arrowDensityLevel);
      // 重建箭头缓冲并重新渲染
      if (useWebGL && resultData) {
        buildAllLayerBuffers();
        render();
      }
    });
  }

  // 箭头大小控制
  const arrowSizeInput = document.getElementById('arrow-size');
  if (arrowSizeInput) {
    arrowSizeInput.addEventListener('input', (e) => {
      arrowSizeLevel = parseFloat(e.target.value);
      // 实时更新箭头大小（使用防抖提高性能）
      if (arrowSizeUpdateTimeout) clearTimeout(arrowSizeUpdateTimeout);
      arrowSizeUpdateTimeout = setTimeout(() => {
        console.log('[Results] Arrow size changed to:', arrowSizeLevel);
        if (useWebGL && resultData) {
          buildAllLayerBuffers();
          render();
        }
      }, 50);
    });
  }

  document.getElementById('st-layer').textContent = '层: ' + layerNamesList[currentLayerIdx];
  updateInfoPanel();
}

function buildSidebar() {
  const container = document.getElementById('sidebar-layers');
  container.innerHTML = '';
  for (let i = 0; i < layerNamesList.length; i++) {
    const item = document.createElement('div');
    item.className = 'layer-item' + (i === currentLayerIdx ? ' active' : '');
    item.dataset.idx = i;

    const dot = document.createElement('span');
    dot.className = 'layer-dot';
    dot.style.background = layerColorHex(i);

    const name = document.createElement('span');
    name.className = 'layer-name';
    name.textContent = layerNamesList[i];
    name.title = layerNamesList[i];

    const eye = document.createElement('button');
    eye.className = 'layer-eye' + (layerVisible[i] ? '' : ' hidden');
    eye.innerHTML = '&#128065;'; // 始终显示眼睛图标
    eye.title = layerVisible[i] ? '隐藏' : '显示';
    eye.addEventListener('click', (e) => {
      e.stopPropagation();
      layerVisible[i] = !layerVisible[i];
      eye.className = 'layer-eye' + (layerVisible[i] ? '' : ' hidden');
      eye.title = layerVisible[i] ? '隐藏' : '显示';
      render();
      updateToggleAllIcon();
    });

    item.appendChild(dot);
    item.appendChild(name);
    item.appendChild(eye);
    item.addEventListener('click', () => {
      currentLayerIdx = i;
      onLayerChange();
      updateSidebarActive();
    });
    container.appendChild(item);
  }
  // 同步全局眼睛图标状态
  updateToggleAllIcon();
}

function updateSidebarActive() {
  const items = document.querySelectorAll('.layer-item');
  items.forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === currentLayerIdx);
  });
  // 同步全局眼睛图标状态
  updateToggleAllIcon();
}

function updateToggleAllIcon() {
  const icon = document.getElementById('toggle-all-icon');
  const btn = document.getElementById('toggle-all-layers');
  if (!icon || !btn) return;
  // 始终使用眼睛图标，通过高亮/灰暗区分状态
  icon.innerHTML = '&#128065;'; // 始终显示睁眼图标
  // 如果所有图层都可见，高亮显示；否则灰暗显示
  const allVisible = layerVisible.every(v => v);
  if (allVisible) {
    btn.classList.remove('hidden');
  } else {
    btn.classList.add('hidden');
  }
}

function toggleAllLayers() {
  // 检查当前状态：如果全部可见，则全部隐藏；否则全部显示
  const allVisible = layerVisible.every(v => v);
  if (allVisible) {
    layerVisible = layerNamesList.map(() => false);
  } else {
    layerVisible = layerNamesList.map(() => true);
  }
  buildSidebar();
  render();
}

function showAllLayers() {
  layerVisible = layerNamesList.map(() => true);
  buildSidebar();
  render();
}

function hideAllLayers() {
  layerVisible = layerNamesList.map(() => false);
  buildSidebar();
  render();
}

function updateInfoPanel() {
  const panel = document.getElementById('info-panel');
  // Hide info panel when showing all networks
  if (isShowingAllNetworks()) {
    panel.style.display = 'none';
    return;
  }
  const ls = resultData.layerSolutions[currentLayerIdx];
  if (!ls) { panel.style.display = 'none'; return; }

  const layerName = layerNamesList[currentLayerIdx];
  let totalVerts = 0, totalTris = 0;
  for (const m of ls.meshes) {
    totalVerts += m.vertices.length;
    totalTris += m.triangles.length;
  }

  const makeItem = (label, value, cls='value') => `<span class="label">${label}:</span> <span class="${cls}">${value}</span>`;
  let row1 = '';
  let row2 = '';

  if (currentViewMode === 'copper_coverage') {
    row1 = `${makeItem('层', layerName)} ${makeItem('网格', `${totalVerts}V/${totalTris}T`)} ${makeItem('模式', '铜箔覆盖')}`;
    row2 = '<span style="color:#f0883e">VCC网络</span> <span style="color:#9b8db3">GND网络</span> <span style="color:#8b949e">无电流铜箔</span>';
  } else if (currentViewMode === 'power') {
    let minPD = Infinity, maxPD = -Infinity;
    for (let mi = 0; mi < ls.meshes.length; mi++) {
      for (const p of (ls.meshes[mi].powerDensities || [])) {
        if (p != null && isFinite(p)) { if (p < minPD) minPD = p; if (p > maxPD) maxPD = p; }
      }
    }
    if (minPD === Infinity) { minPD = 0; maxPD = 0; }
    const pdRangeStr = maxPD > 0
      ? `${minPD.toExponential(2)} ~ ${maxPD.toExponential(2)} W/mm²`
      : '无功率密度数据';
    row1 = `${makeItem('层', layerName)} ${makeItem('网格', `${totalVerts}V/${totalTris}T`)} ${makeItem('功率密度', pdRangeStr)}`;
    row2 = groundCurrentHtml();
  } else {
    let minV = Infinity, maxV = -Infinity;
    for (let ali = 0; ali < resultData.layerSolutions.length; ali++) {
      for (const m of resultData.layerSolutions[ali].meshes) {
        for (const p of m.potentials) {
          if (p != null && isFinite(p)) { if (p < minV) minV = p; if (p > maxV) maxV = p; }
        }
      }
    }
    if (minV === Infinity) { minV = 0; maxV = 0; }

    // Source/load voltages at this layer
    const currentLayerName = layerName;
    let sourceVoltage = null, loadVoltage = null;
    for (const ni of networkInfoData) {
      const srcOnLayer = ni.sourcePads.filter(p => !p.layer || p.layer === currentLayerName);
      const loadOnLayer = ni.loadPads.filter(p => !p.layer || p.layer === currentLayerName);
      let srcSum = 0, srcCnt = 0, loadSum = 0, loadCnt = 0;
      for (const p of srcOnLayer) {
        const v = pickValueAtLayer(p.x, p.y, currentLayerIdx);
        if (v != null && isFinite(v)) { srcSum += v; srcCnt++; }
      }
      for (const p of loadOnLayer) {
        const v = pickValueAtLayer(p.x, p.y, currentLayerIdx);
        if (v != null && isFinite(v)) { loadSum += v; loadCnt++; }
      }
      if (srcCnt > 0) sourceVoltage = srcSum / srcCnt;
      if (loadCnt > 0) loadVoltage = loadSum / loadCnt;
    }

    row1 = `${makeItem('层', layerName)} ${makeItem('网格', `${totalVerts}V/${totalTris}T`)} ${makeItem('全局电压', `${minV.toFixed(4)} ~ ${maxV.toFixed(4)} V`)} ${makeItem('电源', `${vccVoltage.toFixed(2)} V`)}`;
    let parts = [];
    if (sourceVoltage != null) parts.push(makeItem('源端', `${sourceVoltage.toFixed(4)} V`));
    if (loadVoltage != null) {
      parts.push(makeItem('负载', `${loadVoltage.toFixed(4)} V`));
      const effectiveSource = sourceVoltage != null ? sourceVoltage : vccVoltage;
      const drop = effectiveSource - loadVoltage;
      const warnCls = drop > 0.1 ? 'value warn' : 'value';
      parts.push(makeItem('压降', `${drop.toFixed(4)} V (${(drop / effectiveSource * 100).toFixed(2)}%)`, warnCls));
    }
    row2 = parts.length ? parts.join(' ') : groundCurrentHtml();
  }

  panel.innerHTML = `<div class="info-row">${row1}</div><div class="info-row">${row2}</div>`;
  panel.style.display = '';
}

function groundCurrentHtml() {
  const info = resultData.solverInfo;
  if (!info) return '';
  const gniVal = info.groundNodeCurrent;
  const gniStr = gniVal != null ? gniVal.toFixed(6) : 'N/A';
  const gniClass = gniVal != null && Math.abs(gniVal) > 0.001 ? 'value warn' : 'value';
  return `<span class="label">地电流:</span> <span class="${gniClass}">${gniStr} A</span>`;
}

function drawColorbar() {
  const gd = layerGL[currentLayerIdx];
  if (!gd) return;
  const el = document.getElementById('colorbar');
  el.style.display = '';
  el.style.display = 'flex';

  // Draw a single canvas colorbar from a colormap array
  function drawBar(canvasId, cmap) {
    const c = document.getElementById(canvasId);
    if (!c) return;
    const ctx = c.getContext('2d');
    const h = c.height, w = c.width;
    const cn = cmap.length;
    for (let y = 0; y < h; y++) {
      const t = 1 - y / h;
      const pos = t * (cn - 1);
      const lo = Math.floor(pos), hi = Math.min(lo + 1, cn - 1);
      const f = pos - lo;
      const r = Math.round((cmap[lo][0]*(1-f) + cmap[hi][0]*f)*255);
      const g = Math.round((cmap[lo][1]*(1-f) + cmap[hi][1]*f)*255);
      const b = Math.round((cmap[lo][2]*(1-f) + cmap[hi][2]*f)*255);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(0, y, w, 1);
    }
  }

  const cmap = CMAPS[currentCmap] || PLASMA;
  drawBar('cb-canvas-vcc', cmap);

  // Hide numeric labels in copper_coverage mode or when showing all networks
  const isAll = isShowingAllNetworks();
  const isCopperMode = currentViewMode === 'copper_coverage';
  const labelEl = document.querySelector('.cb-labels');
  if (labelEl) {
    labelEl.style.display = (isAll || isCopperMode) ? 'none' : '';
  }

  // Hide colorbar entirely in copper_coverage mode
  if (isCopperMode) {
    el.style.display = 'none';
    return;
  }

  const isGndPower = currentViewMode === 'gnd_power';
  const isPower = currentViewMode === 'power';
  const unit = (isPower || isGndPower) ? ' W/mm²' : ' V';
  const fmtV = v => v != null ? ((isPower || isGndPower) ? v.toExponential(2) : v.toFixed(4)) : '--';

  if (isGndPower) {
    document.getElementById('cb-vcc-max').textContent = fmtV(gd.gndPdMax ?? 0) + unit;
    document.getElementById('cb-vcc-min').textContent = fmtV(gd.gndPdMin ?? 0) + unit;
    document.getElementById('cb-vcc-label').textContent = 'GND功率';
  } else {
    document.getElementById('cb-vcc-max').textContent = isPower ? fmtV(gd.pdMax ?? 0) + unit : fmtV(gd.vMax ?? 0) + ' V';
    document.getElementById('cb-vcc-min').textContent = isPower ? fmtV(gd.pdMin ?? 0) + unit : fmtV(gd.vMin ?? 0) + ' V';
    document.getElementById('cb-vcc-label').textContent = 'VCC';
  }
}

// ============================================================
// Main
// ============================================================
let useWebGL = false;

function main() {
  _log('Main', '=== results.html starting ===');
  const glOk = initGL();
  useWebGL = !!glOk;
  _log('Main', 'WebGL=' + useWebGL + ' stencil=' + (gl ? gl.getParameter(gl.STENCIL_BITS) : 'N/A'));

  eda.sys_MessageBus.subscribe('pdn-results-data', onMessageBusData);

  const storageOk = loadResultSet();
  _log('Main', 'Storage load result: ok=' + storageOk + ' resultSet=' + !!resultSet + ' count=' + (resultSet?.results?.length ?? 0));

  if (storageOk && loadResult(0)) {
    _log('Main', '=== Data loaded from Storage OK ===');
    eda.sys_MessageBus.publish('padne-results-ready', {});
    startUI();
    return;
  }

  // Storage failed or loadResult failed — clear resultSet so message bus fallback works
  if (resultSet) {
    _log('Main', 'Storage had data but loadResult(0) FAILED, clearing resultSet for message bus fallback');
    resultSet = null;
  }

  _log('Main', 'Waiting for message bus data...');
  eda.sys_MessageBus.publish('padne-results-ready', {});

  // Retry from Storage after delay as last resort
  setTimeout(() => {
    if (!resultSet && loadResultSet() && loadResult(0)) {
      _log('Main', 'Delayed Storage retry succeeded');
      startUI();
    }
  }, 2000);
}

function onMessageBusData(msg) {
  _log('MsgBus', 'Received, resultSet already=' + !!resultSet + ' msg keys=' + (msg ? Object.keys(msg).join(',') : 'null'));
  if (resultSet) return;

  // Handle possible message wrapping by different EasyEDA versions
  const data = msg?.data?.resultSet ? msg.data : msg;
  resultSet = data.resultSet;
  layerNames = data.layerNames || {};
  images = data.images || null;

  _log('MsgBus', 'resultSet=' + !!resultSet + ' count=' + (resultSet?.results?.length ?? 0));

  if (!resultSet || !resultSet.results || resultSet.results.length === 0) {
    _log('MsgBus', 'FAIL: no valid results');
    return;
  }

  const entry = resultSet.results[0];
  _log('MsgBus', 'First result: label=' + entry?.label + ' hasResult=' + !!entry?.result
    + ' hasLayerSolutions=' + !!entry?.result?.layerSolutions
    + ' lsCount=' + (entry?.result?.layerSolutions?.length ?? 0));

  if (!loadResult(0)) {
    _log('MsgBus', 'FAIL: loadResult(0) failed');
    return;
  }

  _log('MsgBus', '=== Starting UI from message bus data ===');
  startUI();
}

function startUI() {
  _log('startUI', '=== startUI called ===');
  document.getElementById('loading').style.display = 'none';

  const hasMeshData = resultData?.layerSolutions?.some(ls => ls.meshes?.length > 0 && ls.meshes.some(m => m.vertices?.length > 0));
  _log('startUI', 'hasMeshData=' + hasMeshData + ' layerNamesList=' + layerNamesList.length);

  if (!hasMeshData) {
    const wrap = document.querySelector('.canvas-wrap');
    wrap.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b949e;font-size:14px">无有效分析结果</div>';
    document.getElementById('colorbar').style.display = 'none';
    document.getElementById('info-panel').style.display = 'none';
    return;
  }

  // WebGL 渲染 — 只要有任意层有数据即可，自动切到第一个有数据的层
  if (useWebGL) {
    // 当前层没有连通 mesh 时，自动切换到第一个有 meshVBO 的层
    if (!layerGL[currentLayerIdx] || !layerGL[currentLayerIdx].meshVBO) {
      for (let li = 0; li < layerNamesList.length; li++) {
        if (layerGL[li] && layerGL[li].meshVBO) {
          currentLayerIdx = li;
          break;
        }
      }
    }
    try {
      setupUI();
      setupInteraction();
      drawColorbar();
      render();
      _log('startUI', '=== WebGL rendering started ===');
    } catch (e) {
      _log('startUI', 'WARN: render setup error: ' + (e.message || e));
    }
  } else {
    showImageFallback();
  }

  // 更��警告按钮显示
  updateWarningButton();
}

function showImageFallback() {
  const toolbar = document.getElementById('toolbar');
  toolbar.innerHTML = '<span style="padding:0 12px;color:#8b949e">WebGL 不可用，使用图片模式</span><span class="spacer"></span><button class="btn-close" onclick="closeWindow()">关闭</button>';

  const wrap = document.querySelector('.canvas-wrap');
  document.getElementById('colorbar').style.display = 'none';
  document.getElementById('info-panel').style.display = 'none';

  if (!images) {
    wrap.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#484f58">无可视化数据</div>';
    return;
  }

  const layerImgs = images.layers || {};
  const layerKeys = Object.keys(layerImgs).sort();
  let tabs = '';
  if (images.view_3d) tabs += '<button class="view-tab active" data-view="3d">3D 视图</button>';
  for (const k of layerKeys) tabs += '<button class="view-tab" data-view="' + k + '">' + k + '</button>';

  wrap.innerHTML =
    '<div class="view-tabs" style="display:flex;gap:2px;padding:4px 8px;background:#f5f5f5;border-bottom:1px solid #ddd">' + tabs + '</div>' +
    '<div id="img-area" style="flex:1;display:flex;align-items:center;justify-content:center;background:#fff;padding:8px"></div>';

  let currentView = images.view_3d ? '3d' : (layerKeys[0] || null);
  showImg(currentView);

  wrap.querySelectorAll('.view-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      wrap.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      showImg(btn.dataset.view);
    });
  });

  function showImg(view) {
    const area = document.getElementById('img-area');
    let b64 = null;
    if (view === '3d') b64 = images.view_3d;
    else b64 = layerImgs[view];
    if (!b64) { area.innerHTML = '<div style="color:#999">该视图无数据</div>'; return; }
    area.innerHTML = '<img src="data:image/png;base64,' + b64 + '" style="max-width:100%;max-height:100%;object-fit:contain">';
  }
}

// ============================================================
// 警告按钮相关函数
// ============================================================
function updateWarningButton() {
  const btnWarn = document.getElementById('btn-warn');
  const currentWarnings = currentResultWarnings || [];
  // 过滤掉线宽摘要
  const realWarnings = currentWarnings.filter(w => w.network_name !== '[线宽摘要]');
  _log('WarnBtn', 'realWarnings=' + realWarnings.length);
  if (realWarnings.length > 0) {
    _log('WarnBtn', 'warnings=' + JSON.stringify(realWarnings));
  }
  // 只要有真正的电流容量警告就显示按钮（包括超限和接近上限）
  if (realWarnings.length > 0 && btnWarn) {
    btnWarn.style.display = '';
    _log('WarnBtn', 'Showing button');
    // 统计超限数量
    const exceededCount = realWarnings.filter(w => w.is_exceeded).length;
    if (exceededCount > 0) {
      btnWarn.title = `电流容量警告 (${exceededCount}个网络超限)`;
    } else {
      btnWarn.title = `电流容量警告 (${realWarnings.length}个网络接近上限)`;
    }
  } else if (btnWarn) {
    btnWarn.style.display = 'none';
    _log('WarnBtn', 'Hiding button');
  } else {
    _log('WarnBtn', 'btnWarn element not found');
  }
}

function showWarning() {
  const overlay = document.getElementById('warn-overlay');
  const body = document.getElementById('warn-content');
  const currentWarnings = currentResultWarnings || [];

  // 过滤掉线宽摘要，只显示真正的警告
  const realWarnings = currentWarnings.filter(w => w.network_name !== '[线宽摘要]');

  if (realWarnings.length === 0) {
    body.innerHTML = '<div style="text-align:center;padding:40px;color:#3fb950"><span style="font-size:48px">✓</span><p style="margin-top:16px">电流容量检查通过，无超限警告</p></div>';
  } else {
    // 统计信息
    const exceededCount = realWarnings.filter(w => w.is_exceeded).length;
    const nearLimitCount = realWarnings.length - exceededCount;

    let html = '<div style="padding:8px 16px;margin-bottom:16px;background:#161b22;border-radius:6px;border:1px solid #30363d">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    if (exceededCount > 0) {
      html += '<span style="font-size:20px;color:#f85149">⚠</span>';
      html += '<span style="color:#f85149;font-weight:600">发现 ' + exceededCount + ' 个网络电流超限！</span>';
    } else {
      html += '<span style="font-size:20px;color:#f0883e">⚠</span>';
      html += '<span style="color:#f0883e;font-weight:600">发现 ' + nearLimitCount + ' 个网络接近上限</span>';
    }
    html += '</div></div>';

    // 每个警告详情
    for (const w of realWarnings) {
      const severity = w.is_exceeded ? 'error' : 'warning';
      const severityColor = w.is_exceeded ? '#f85149' : '#f0883e';
      const severityIcon = w.is_exceeded ? '✕' : '⚠';
      const severityText = w.is_exceeded ? '超限' : '接近上限';

      html += '<div style="margin-bottom:12px;padding:12px;background:#0d1117;border-radius:6px;border:1px solid ' + severityColor + ';border-left:4px solid ' + severityColor + '">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
      html += '<span style="font-size:18px;color:' + severityColor + '">' + severityIcon + '</span>';
      html += '<span style="color:' + severityColor + ';font-weight:600;font-size:13px">[' + w.network_name + ' @ ' + w.layer_name + ']</span>';
      html += '<span style="color:#8b949e;font-size:11px">' + severityText + '</span>';
      html += '</div>';

      html += '<div style="padding:8px 12px;background:#161b22;border-radius:4px;font-size:12px;line-height:1.8">';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px">';
      html += '<span style="color:#8b949e">配置电流:</span>';
      html += '<span style="color:#f0f6fc;font-weight:600">' + w.calculated_current.toFixed(2) + ' A</span>';
      html += '</div>';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px">';
      html += '<span style="color:#8b949e">最大允许:</span>';
      html += '<span style="color:' + severityColor + ';font-weight:600">' + w.max_allowed_current.toFixed(2) + ' A</span>';
      html += '</div>';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px">';
      html += '<span style="color:#8b949e">利用率:</span>';
      html += '<span style="color:' + severityColor + ';font-weight:600">' + (w.utilization * 100).toFixed(0) + '%</span>';
      html += '</div>';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px">';
      html += '<span style="color:#8b949e">走线宽度:</span>';
      html += '<span style="color:#f0f6fc">' + w.trace_width_mm.toFixed(3) + ' mm</span>';
      html += '</div>';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:4px">';
      html += '<span style="color:#8b949e">铜厚度:</span>';
      html += '<span style="color:#f0f6fc">' + w.copper_oz.toFixed(2) + ' oz</span>';
      html += '</div>';
      html += '<div style="display:flex;justify-content:space-between">';
      html += '<span style="color:#8b949e">温升设置:</span>';
      html += '<span style="color:#f0f6fc">' + w.temp_rise + ' °C</span>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
    }

    // 建议
    html += '<div style="margin-top:16px;padding:12px;background:#161b22;border-radius:6px;border:1px solid #30363d">';
    html += '<div style="color:#58a6ff;font-weight:600;margin-bottom:8px">💡 建议解决方案:</div>';
    html += '<ul style="color:#c9d1d9;font-size:12px;line-height:1.8;margin:0;padding-left:20px">';
    html += '<li>增加走线宽度（当前宽度可能不足以承载配置电流）</li>';
    html += '<li>增加铜厚度（使用更厚的铜箔）</li>';
    html += '<li>降低温升要求（如果允许更高的温升）</li>';
    html += '<li>分流：将负载分配到多个并联走线</li>';
    html += '</ul>';
    html += '</div>';

    body.innerHTML = html;
  }
  overlay.style.display = '';
}

try { main(); } catch(e) { _log('FATAL', 'main() crashed: ' + (e.message || e) + '\n' + (e.stack || '')); }
</script>

<div id="diag-overlay" class="diag-overlay" style="display:none">
  <div class="diag-modal">
    <div class="diag-header">
      <h3>诊断日志</h3>
      <button id="diag-header-copy-btn" onclick="copyDiag()">复制</button>
      <button onclick="document.getElementById('diag-overlay').style.display='none'">关闭</button>
    </div>
    <div class="diag-body" id="diag-content">无诊断信息</div>
  </div>
</div>

<div id="warn-overlay" class="diag-overlay" style="display:none">
  <div class="diag-modal" style="width:600px">
    <div class="diag-header">
      <h3 style="display:flex;align-items:center;gap:8px">
        <span style="color:#f0883e">⚠</span>
        <span>电流容量检查报告</span>
      </h3>
      <button onclick="document.getElementById('warn-overlay').style.display='none'">关闭</button>
    </div>
    <div class="diag-body" id="warn-content" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;line-height:1.5;white-space:normal;padding:16px">无警告信息</div>
  </div>
</div>

<script>
(function() {
  function showDiag() {
    const overlay = document.getElementById('diag-overlay');
    const body = document.getElementById('diag-content');
    const diags = resultData && resultData.diagnostics ? resultData.diagnostics : [];

    // 添加电流容量检查警告
    const currentWarnings = resultData && resultData.currentWarnings ? resultData.currentWarnings : [];
    const warningLines = [];
    if (currentWarnings.length > 0) {
      warningLines.push('========== 电流容量检查 ==========');
      for (const w of currentWarnings) {
        // 如果 message 包含换行符，拆分成多行显示
        if (w.message && w.message.includes('\n')) {
          warningLines.push(...w.message.split('\n'));
        } else {
          warningLines.push(w.message || `${w.network_name}@${w.layer_name}: ${w.calculated_current.toFixed(2)}A / ${w.max_allowed_current.toFixed(2)}A (${(w.utilization*100).toFixed(0)}%)`);
        }
      }
      warningLines.push('');
    }

    const allLines = [...dataFlowLog, '', ...diags, '', ...warningLines, '', ...meshDiagLines];
    if (allLines.length === 0) {
      body.textContent = '无诊断日志数据';
    } else {
      body.innerHTML = allLines.map(line => {
        if (line.startsWith('===')) return '<span class="diag-section">' + escHtml(line) + '</span>';
        if (line.includes('FAIL') || line.includes('ERROR') || line.includes('失败') || line.includes('电流超限')) return '<span class="diag-bad">' + escHtml(line) + '</span>';
        if (line.includes('无求解数据') || line.includes('断开mesh') || line.includes('clearing') || line.includes('电流接近上限')) return '<span class="diag-warn">' + escHtml(line) + '</span>';
        if (line.startsWith('[')) return '<span style="color:#79c0ff">' + escHtml(line) + '</span>';
        return escHtml(line);
      }).join('\n');
    }
    overlay.style.display = '';
  }
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  async function copyDiag() {
    var diags = resultData && resultData.diagnostics ? resultData.diagnostics : [];
    var currentWarnings = resultData && resultData.currentWarnings ? resultData.currentWarnings : [];
    var warningLines = [];
    if (currentWarnings.length > 0) {
      warningLines.push('========== 电流容量检查 ==========');
      for (var w of currentWarnings) {
        if (w.message && w.message.indexOf('\n') >= 0) {
          warningLines.push.apply(warningLines, w.message.split('\n'));
        } else {
          warningLines.push(w.message || (w.network_name + '@' + w.layer_name + ': ' + w.calculated_current.toFixed(2) + 'A / ' + w.max_allowed_current.toFixed(2) + 'A (' + (w.utilization*100).toFixed(0) + '%)'));
        }
      }
      warningLines.push('');
    }
    var allLines = [].concat(dataFlowLog, [''], diags, [''], warningLines, [''], meshDiagLines);
    var text = allLines.join('\n');
    var btn = document.getElementById('diag-header-copy-btn');

    // Try Clipboard API first, fallback to textarea selection.
    if (navigator.clipboard && navigator.clipboard.writeText) {
      try {
        await navigator.clipboard.writeText(text);
        var origText = btn.textContent;
        btn.textContent = '已复制';
        setTimeout(function() { btn.textContent = origText; }, 1500);
        return;
      } catch (e) {
        console.warn('[Results] Clipboard API failed, falling back', e);
      }
    }

    var body = document.getElementById('diag-content');
    var origHtml = body.innerHTML;
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.readOnly = true;
    ta.style.cssText = 'width:100%;height:60vh;resize:none;font-family:Consolas,Monaco,monospace;font-size:11.5px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:8px';
    body.textContent = '';
    body.appendChild(ta);
    ta.select();
    btn.textContent = '请按 Ctrl+C 复制';
    btn.disabled = true;
    ta.addEventListener('blur', function() {
      body.innerHTML = origHtml;
      btn.textContent = '复制';
      btn.disabled = false;
    });
  }
  // Expose for the inline onclick handler in the diagnostic dialog.
  window.copyDiag = copyDiag;

  async function copyImage() {
    if (!canvas || !gl) {
      console.warn('[Results] copyImage: WebGL not ready');
      return;
    }
    render();
    const btn = document.getElementById('btn-copyimg');
    const origText = btn.textContent;
    try {
      const blob = await new Promise((resolve, reject) => {
        canvas.toBlob((b) => b ? resolve(b) : reject(new Error('toBlob failed')), 'image/png');
      });
      if (navigator.clipboard && navigator.clipboard.write) {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        btn.textContent = '已复制';
      } else {
        // Fallback: open image in new window
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
        btn.textContent = '已打开';
      }
    } catch (e) {
      console.error('[Results] copyImage failed', e);
      btn.textContent = '失败';
    }
    setTimeout(() => { btn.textContent = origText; }, 1500);
  }

  document.getElementById('btn-diag').addEventListener('click', showDiag);
  document.getElementById('btn-copyimg').addEventListener('click', copyImage);
})();
</script>
