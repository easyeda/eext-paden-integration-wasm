<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>PDN 分析结果</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; border: 6px solid #484f58; box-sizing: border-box; }

  .toolbar { height: 36px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; padding: 0 8px; gap: 6px; flex-shrink: 0; }
  .toolbar select { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 4px; padding: 3px 8px; font-size: 12px; cursor: pointer; }
  .toolbar button { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 4px; padding: 3px 10px; font-size: 11px; cursor: pointer; }
  .toolbar button:hover { background: #30363d; }
  .toolbar button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .toolbar .sep { width: 1px; height: 20px; background: #30363d; margin: 0 4px; }
  .toolbar .spacer { flex: 1; }
  .toolbar .btn-close { background: #da3633; border-color: #da3633; color: #fff; }
  .toolbar .btn-close:hover { background: #f85149; }
  .toolbar .btn-warn { background: #da3633; border-color: #da3633; color: #fff; position: relative; padding: 3px 12px; }
  .toolbar .btn-warn:hover { background: #f85149; }
  .toolbar .btn-warn .warn-icon { font-size: 14px; }
  .toolbar .btn-warn .warn-badge { position: absolute; top: -4px; right: -4px; background: #f85149; color: #fff; font-size: 9px; padding: 1px 4px; border-radius: 8px; min-width: 14px; text-align: center; }

  .result-tabs { height: 30px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; padding: 0 8px; gap: 4px; flex-shrink: 0; }
  .result-tabs button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 3px; padding: 2px 10px; font-size: 11px; cursor: pointer; }
  .result-tabs button:hover { background: #30363d; }
  .result-tabs button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

  .diag-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .diag-modal { background: #161b22; border: 1px solid #30363d; border-radius: 8px; width: 720px; max-height: 80vh; display: flex; flex-direction: column; }
  .diag-header { padding: 12px 16px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 8px; }
  .diag-header h3 { flex: 1; font-size: 14px; color: #f0f6fc; }
  .diag-header button { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 4px; padding: 4px 12px; font-size: 11px; cursor: pointer; }
  .diag-header button:hover { background: #30363d; }
  .diag-body { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: 'Consolas', 'Monaco', monospace; font-size: 11.5px; line-height: 1.7; color: #c9d1d9; white-space: pre-wrap; word-break: break-all; }
  .diag-body .diag-section { color: #58a6ff; font-weight: 700; margin-top: 8px; }
  .diag-body .diag-warn { color: #f0883e; }
  .diag-body .diag-ok { color: #3fb950; }
  .diag-body .diag-bad { color: #f85149; }
  .info-panel .diag-link { color: #58a6ff; cursor: pointer; text-decoration: underline; pointer-events: auto; }

  .layer-sidebar { width: 170px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  .sidebar-header { padding: 8px 10px; font-size: 12px; font-weight: 600; color: #8b949e; border-bottom: 1px solid #30363d; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: space-between; }
  .sidebar-header-title { flex: 1; }
  .sidebar-layers { flex: 1; overflow-y: auto; padding: 4px 0; }
  .sidebar-layers::-webkit-scrollbar { width: 5px; }
  .sidebar-layers::-webkit-scrollbar-track { background: transparent; }
  .sidebar-layers::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  .layer-item { display: flex; align-items: center; padding: 4px 8px; gap: 6px; cursor: pointer; transition: background 0.15s; }
  .layer-item:hover { background: #21262d; }
  .layer-item.active { background: #1c2536; }
  .layer-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .layer-name { flex: 1; font-size: 11px; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .layer-item.active .layer-name { color: #f0f6fc; font-weight: 600; }
  .layer-eye { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: #8b949e; cursor: pointer; border-radius: 3px; font-size: 16px; flex-shrink: 0; }
  .layer-eye:hover { background: #30363d; color: #e6edf3; }
  .layer-eye.hidden { color: #484f58; }

  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  #gl-canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

  .colorbar { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); display: flex; gap: 4px; align-items: stretch; pointer-events: none; }
  .colorbar canvas { border: 1px solid #30363d; border-radius: 3px; }
  .cb-labels { display: flex; flex-direction: column; justify-content: space-between; font-size: 10px; font-family: monospace; color: #8b949e; padding: 2px 0; }

  .info-panel { position: absolute; left: 12px; bottom: 12px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 6px; padding: 6px 12px; font-size: 11px; font-family: monospace; line-height: 1.5; color: #c9d1d9; pointer-events: none; max-width: 92%; display: flex; flex-direction: row; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .info-row { display: contents; }
  .info-panel .label { color: #8b949e; }
  .info-panel .value { color: #f0f6fc; font-weight: 600; }
  .info-panel .warn { color: #f0883e; }

  .tooltip { position: absolute; background: rgba(13,17,23,0.92); border: 1px solid #30363d; border-radius: 4px; padding: 5px 9px; font-size: 11px; font-family: monospace; color: #c9d1d9; pointer-events: none; white-space: nowrap; line-height: 1.5; z-index: 10; }

  .statusbar { height: 26px; background: #161b22; border-top: 1px solid #30363d; display: flex; align-items: center; padding: 0 12px; gap: 20px; font-size: 11px; font-family: monospace; color: #8b949e; flex-shrink: 0; }
  .statusbar span { white-space: nowrap; }
  .statusbar span.hidden, #st-voltage.hidden, #st-delta.hidden { display: none !important; }

  .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #484f58; font-size: 14px; }
  .view-tab { padding: 3px 12px; border: 1px solid #ccc; border-radius: 3px; background: #fff; cursor: pointer; font-size: 11px; }
  .view-tab:hover { background: #e8e8e8; }
  .view-tab.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
</style>
</head>
<body>

<div class="toolbar" id="toolbar">
  <button id="btn-edges" title="网格线 (E)">网格</button>
  <button id="btn-outline" title="轮廓 (O)">轮廓</button>
  <button id="btn-vias" title="过孔 (C)">过孔</button>
  <button id="btn-flow" title="电流流向 (F)">电流</button>
  <select id="arrow-density" title="箭头密度 (D)" style="margin:0 4px;display:none">
    <option value="0.25">稀疏</option>
    <option value="0.5">较疏</option>
    <option value="1" selected>标准</option>
    <option value="2">较密</option>
    <option value="4">密集</option>
  </select>
  <span id="arrow-size-control" style="display:none;align-items:center;gap:4px;margin:0 4px">
    <span style="font-size:10px;color:#8b949e">大小:</span>
    <input type="range" id="arrow-size" min="0.3" max="2.0" step="0.1" value="1.0" style="width:60px;height:16px;cursor:pointer" title="箭头大小">
  </span>
  <button id="btn-viewmode" title="切换电压/功率密度 (P)">功率密度</button>
  <button id="btn-gndpower" title="接地功率密度 (G)">GND功率</button>
  <button id="btn-copper" title="铜箔覆盖视图 (M)">铜箔</button>
  <div class="sep"></div>
  <button id="btn-diag" title="诊断日志">诊断</button>
  <button id="btn-copyimg" title="复制当前视图图片">复制图片</button>
  <button id="btn-warn" title="电流容量警告" style="display:none"><span class="warn-icon">⚠</span></button>
  <button id="btn-reset" title="重置视图 (R)">重置</button>
  <span class="spacer"></span>
  <button id="btn-reanalyze" style="background:#238636;border-color:#238636;color:#fff" onclick="reanalyze()">重新分析</button>
  <button class="btn-close" onclick="closeWindow()">关闭</button>
</div>

<div class="result-tabs" id="result-tabs" style="display:none"></div>

<div style="flex:1;display:flex;overflow:hidden">
<div class="layer-sidebar" id="layer-sidebar">
  <div class="sidebar-header">
    <span class="sidebar-header-title">图层</span>
    <button class="layer-eye" id="toggle-all-layers" title="切换所有图层显示" onclick="toggleAllLayers()">
      <span id="toggle-all-icon">&#128065;</span>
    </button>
  </div>
  <div class="sidebar-layers" id="sidebar-layers"></div>
</div>
<div class="main-area">
<div class="canvas-wrap">
  <canvas id="gl-canvas"></canvas>
  <div class="colorbar" id="colorbar" style="display:none;flex-direction:column;gap:8px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <span id="cb-vcc-label" style="font-size:9px;color:#f0a050;font-weight:600">VCC</span>
      <div style="display:flex;gap:3px;align-items:stretch">
        <canvas id="cb-canvas-vcc" width="14" height="110"></canvas>
        <div class="cb-labels" style="padding:0"><span id="cb-vcc-max">-</span><span id="cb-vcc-min">-</span></div>
      </div>
    </div>
  </div>
  <div class="info-panel" id="info-panel" style="display:none"></div>
  <div class="tooltip" id="tooltip" style="display:none"></div>
  <div class="loading" id="loading">正在加载分析数据...</div>
</div>
</div>
</div>

<div class="statusbar">
  <span id="st-layer">层: --</span>
  <span id="st-pos">X: --  Y: --</span>
  <span id="st-voltage">电压: --</span>
  <span id="st-delta">Δ: --</span>
</div>
<div id="warning-banner" style="display:none;position:fixed;bottom:28px;left:0;right:0;background:#da3633;color:#fff;padding:4px 12px;font-size:12px;text-align:center;z-index:100"></div>

function _log(tag, ...args) {
  const msg = args.map(a => {
    if (a === null) return 'null';
    if (a === undefined) return 'undefined';
    if (typeof a === 'object') try { return JSON.stringify(a).slice(0, 200); } catch { return String(a); }
    return String(a);
  }).join(' ');
  const line = `[${tag}] ${msg}`;
  dataFlowLog.push(line);
  console.log('[Results]', tag, ...args);
}

// Safe vertex access: handles both {x,y} and [x,y] formats
function vx(v) { return v.x != null ? v.x : v[0]; }
function vy(v) { return v.y != null ? v.y : v[1]; }


// ============================================================
// Shader helpers
// ============================================================
function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function linkProgram(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vs, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(fs, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error('Program error:', gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

function getUniforms(prog, names) {
  const u = {};
  for (const n of names) u[n] = gl.getUniformLocation(prog, n);
  return u;
}

function getAttribs(prog, names) {
  const a = {};
  for (const n of names) a[n] = gl.getAttribLocation(prog, n);
  return a;
}

// ============================================================
// Init WebGL
// ============================================================
function updateCmapTexture() {
  if (!gl || !cmapTex) return;
  const cmap = CMAPS[currentCmap] || PLASMA;
  const n = cmap.length;
  const data = new Uint8Array(256 * 4);
  for (let i = 0; i < 256; i++) {
    const t = i / 255 * (n - 1);
    const lo = Math.floor(t), hi = Math.min(lo + 1, n - 1);
    const f = t - lo;
    data[i*4+0] = Math.round((cmap[lo][0] * (1-f) + cmap[hi][0] * f) * 255);
    data[i*4+1] = Math.round((cmap[lo][1] * (1-f) + cmap[hi][1] * f) * 255);
    data[i*4+2] = Math.round((cmap[lo][2] * (1-f) + cmap[hi][2] * f) * 255);
    data[i*4+3] = 255;
  }
  gl.bindTexture(gl.TEXTURE_2D, cmapTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 256, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, data);
}

function fillCmapTexture(tex, cmap) {
  const n = cmap.length;
  const data = new Uint8Array(256 * 4);
  for (let i = 0; i < 256; i++) {
    const t = i / 255 * (n - 1);
    const lo = Math.floor(t), hi = Math.min(lo + 1, n - 1);
    const f = t - lo;
    data[i*4+0] = Math.round((cmap[lo][0] * (1-f) + cmap[hi][0] * f) * 255);
    data[i*4+1] = Math.round((cmap[lo][1] * (1-f) + cmap[hi][1] * f) * 255);
    data[i*4+2] = Math.round((cmap[lo][2] * (1-f) + cmap[hi][2] * f) * 255);
    data[i*4+3] = 255;
  }
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 256, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, data);
}

function updateCmapTexture() {
  if (!gl || !cmapTex) return;
  fillCmapTexture(cmapTex, CMAPS[currentCmap] || PLASMA);
}
function initGL() {
  canvas = document.getElementById('gl-canvas');
  gl = canvas.getContext('webgl', { antialias: true, alpha: false, stencil: true, preserveDrawingBuffer: true });
  if (!gl) { document.getElementById('loading').textContent = 'WebGL not supported'; return false; }

  ext32bit = gl.getExtension('OES_element_index_uint');
  console.log('[Results] WebGL stencil bits:', gl.getParameter(gl.STENCIL_BITS));

  meshProg = { prog: linkProgram(VS_MESH, FS_MESH) };
  if (!meshProg.prog) { console.error('[Results] meshProg FAILED to compile'); }
  meshProg.u = getUniforms(meshProg.prog, ['u_mvp','u_cmap','u_alpha']);
  meshProg.a = getAttribs(meshProg.prog, ['a_pos','a_val']);

  lineProg = { prog: linkProgram(VS_LINE, FS_LINE) };
  lineProg.u = getUniforms(lineProg.prog, ['u_mvp','u_color']);
  lineProg.a = getAttribs(lineProg.prog, ['a_pos']);

  pointProg = { prog: linkProgram(VS_POINT, FS_POINT) };
  pointProg.u = getUniforms(pointProg.prog, ['u_mvp','u_worldToPx']);
  pointProg.a = getAttribs(pointProg.prog, ['a_pos','a_col','a_dia']);

  cmapTex = gl.createTexture();
  updateCmapTexture();
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

  gl.clearColor(0.08, 0.10, 0.12, 1.0);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  return true;
}

// ============================================================
// Data loading & buffer creation
// ============================================================
function loadResultSet() {
  try {
    const raw = eda.sys_Storage.getExtensionUserConfig('pdn-results');
    if (!raw || typeof raw !== 'string') {
      _log('Storage', 'no data, type=' + typeof raw);
      return false;
    }
    _log('Storage', 'raw size=' + raw.length + ' chars');
    const d = JSON.parse(raw);
    resultSet = d.resultSet;
    layerNames = d.layerNames || {};
    if (!resultSet || !resultSet.results || resultSet.results.length === 0) {
      _log('Storage', 'parsed but no valid resultSet');
      return false;
    }
    _log('Storage', 'OK, results=' + resultSet.results.length);

    try {
      const rawImgs = eda.sys_Storage.getExtensionUserConfig('pdn-results-images');
      if (rawImgs && typeof rawImgs === 'string') images = JSON.parse(rawImgs);
    } catch(e) {}

    return true;
  } catch(e) { _log('Storage', 'PARSE ERROR: ' + (e.message || e)); return false; }
}

function loadResult(idx) {
  const entry = resultSet.results[idx];
  if (!entry) { _log('loadResult', 'no entry at index ' + idx); return false; }
  currentResultIdx = idx;

  resultData = entry.result;
  connectionPoints = entry.connectionPoints || {};
  layerBoundaries = entry.layerBoundaries || {};
  pcbContext = entry.pcbContext || null;
  networkInfoData = entry.networkInfo || [];
  currentResultWarnings = entry.currentWarnings || [];
  // Try also getting from resultData if entry.currentWarnings is empty
  if (!currentResultWarnings || currentResultWarnings.length === 0) {
    currentResultWarnings = resultData.currentWarnings || [];
  }
  // 保存提取器诊断日志
  dataFlowLog = entry.extractorDiagnostics || [];
  if (dataFlowLog.length > 0) {
    console.log('[Results] extractorDiagnostics:\n' + dataFlowLog.join('\n'));
  }
  const backendDiags = resultData.diagnostics || [];
  if (backendDiags.length > 0) {
    console.log('[Results] backendDiagnostics:\n' + backendDiags.join('\n'));
  }

  _log('loadResult', 'entry keys=' + Object.keys(entry).join(','));
  _log('loadResult', 'entry.currentWarnings=' + (entry.currentWarnings?.length || 0));
  _log('loadResult', 'resultData.currentWarnings=' + (resultData.currentWarnings?.length || 0));
  _log('loadResult', 'currentResultWarnings=' + currentResultWarnings.length);

  // Determine VCC voltage (highest non-GND network voltage)
  vccVoltage = 1.2;
  for (const ni of networkInfoData) {
    const nameUp = (ni.name || '').toUpperCase();
    if (!nameUp.includes('GND') && ni.voltage > vccVoltage) vccVoltage = ni.voltage;
  }
  dataFlowLog.push(`[VCC电压检测] 网络数=${networkInfoData.length}, 设定VCC电压=${vccVoltage.toFixed(2)}V`);
  if (networkInfoData.length > 0) {
    for (const ni of networkInfoData) {
      dataFlowLog.push(`  网络: ${ni.name}, 电压=${ni.voltage.toFixed(2)}V`);
    }
  }

  const warning = entry.warningMessage;
  const banner = document.getElementById('warning-banner');
  if (banner) {
    if (warning) { banner.textContent = warning; banner.style.display = 'block'; }
    else { banner.style.display = 'none'; }
  }

  if (!resultData || !resultData.layerSolutions) {
    _log('loadResult', 'FAIL: resultData=' + !!resultData + ' layerSolutions=' + !!resultData?.layerSolutions);
    return false;
  }
  _log('loadResult', 'layerSolutions=' + resultData.layerSolutions.length);

  layerNamesList = resultData.layerSolutions.map((ls, i) => ls.layerName || layerNames[i] || ('Layer ' + i));
  layerVisible = layerNamesList.map(() => true);
  currentLayerIdx = 0;


  let bx0=Infinity, bx1=-Infinity, by0=Infinity, by1=-Infinity;
  for (const ls of resultData.layerSolutions) {
    for (const m of ls.meshes) {
      for (const v of m.vertices) {
        const x = vx(v), y = vy(v);
        if (x < bx0) bx0 = x; if (x > bx1) bx1 = x;
        if (y < by0) by0 = y; if (y > by1) by1 = y;
      }
    }
  }
  if (bx0 === Infinity) {
    _log('loadResult', 'FAIL: no vertex bounds (all meshes empty?)');
    return false;
  }
  _log('loadResult', 'bounds X=[' + bx0.toFixed(2) + ',' + bx1.toFixed(2) + '] Y=[' + by0.toFixed(2) + ',' + by1.toFixed(2) + ']');
  bounds = { minX: bx0, maxX: bx1, minY: by0, maxY: by1 };

  if (pcbContext) {
    for (const t of (pcbContext.contextTracks || [])) {
      if (t.x1 < bounds.minX) bounds.minX = t.x1; if (t.x1 > bounds.maxX) bounds.maxX = t.x1;
      if (t.y1 < bounds.minY) bounds.minY = t.y1; if (t.y1 > bounds.maxY) bounds.maxY = t.y1;
      if (t.x2 < bounds.minX) bounds.minX = t.x2; if (t.x2 > bounds.maxX) bounds.maxX = t.x2;
      if (t.y2 < bounds.minY) bounds.minY = t.y2; if (t.y2 > bounds.maxY) bounds.maxY = t.y2;
    }
    for (const p of (pcbContext.contextPads || [])) {
      const hw = p.width / 2, hh = p.height / 2;
      if (p.x - hw < bounds.minX) bounds.minX = p.x - hw;
      if (p.x + hw > bounds.maxX) bounds.maxX = p.x + hw;
      if (p.y - hh < bounds.minY) bounds.minY = p.y - hh;
      if (p.y + hh > bounds.maxY) bounds.maxY = p.y + hh;
    }
  }

  if (useWebGL) {
    try {
      buildAllLayerBuffers();
      _log('loadResult', 'WebGL buffers built OK');
    } catch (e) {
      _log('loadResult', 'FAIL: buildAllLayerBuffers crashed: ' + (e.message || e));
      return false;
    }
  }
  resetView();
  _log('loadResult', '=== loadResult(0) complete ===');
  return true;
}

let meshDiagLines = [];

function buildAllLayerBuffers() {
  layerGL = {};
  meshDiagLines = [];
  meshDiagLines.push(`========== Mesh 数据诊断 ==========`);
  meshDiagLines.push(`总层数: ${resultData.layerSolutions.length}`);

  // Check total vertex count before processing to prevent stack overflow
  let totalVertices = 0;
  for (const ls of resultData.layerSolutions) {
    for (const m of ls.meshes) {
      totalVertices += (m.vertices?.length || 0);
    }
  }
  meshDiagLines.push(`总顶点数: ${totalVertices.toLocaleString()}`);

  // Warn if mesh is too large for WebGL visualization
  if (totalVertices > 500000) {
    meshDiagLines.push(``);
    meshDiagLines.push(`⚠️  警告: 网格顶点数 (${totalVertices.toLocaleString()}) 超过 WebGL 可视化限制 (500K)`);
    meshDiagLines.push(`   建议在后端增加网格简化功能`);
    meshDiagLines.push(`   当前仅显示诊断数据，不显示可视化图形。`);
    _showLargeMeshWarning(totalVertices);
    return;  // Skip WebGL buffer building
  }

  // Compute global voltage range across ALL layers — exclude GND meshes
  let globalVMin = Infinity, globalVMax = -Infinity;
  for (let li = 0; li < resultData.layerSolutions.length; li++) {
    for (const m of resultData.layerSolutions[li].meshes) {
      // Use max potential to decide whether a mesh belongs to a GND net.
      // Averaging hides mixed source/GND meshes whose max is still above GND.
      let mMax = -Infinity;
      for (const p of m.potentials) {
        if (p != null && isFinite(p) && p > mMax) mMax = p;
      }
      if (mMax < vccVoltage * 0.3) continue;
      for (const p of m.potentials) {
        if (p != null && isFinite(p)) {
          if (p < globalVMin) globalVMin = p;
          if (p > globalVMax) globalVMax = p;
        }
      }
    }
  }
  meshDiagLines.push(`[电压范围计算] VCC电压=${vccVoltage.toFixed(2)}V, 全局电压范围=[${globalVMin === Infinity ? '未计算' : globalVMin.toFixed(4)}, ${globalVMax === -Infinity ? '未计算' : globalVMax.toFixed(4)}]V, 网络数量=${networkInfoData.length}`);
  if (globalVMin === Infinity) { globalVMin = 0; globalVMax = 1; }

  // Compute global power density range across ALL layers — exclude GND meshes
  let globalPdMin = Infinity, globalPdMax = -Infinity;
  for (let li = 0; li < resultData.layerSolutions.length; li++) {
    for (const m of resultData.layerSolutions[li].meshes) {
      let mMax = -Infinity;
      for (const p of m.potentials) {
        if (p != null && isFinite(p) && p > mMax) mMax = p;
      }
      if (mMax < vccVoltage * 0.3) continue;
      const pd = m.powerDensities || [];
      for (const v of pd) {
        if (v != null && isFinite(v) && v > 0) {
          if (v < globalPdMin) globalPdMin = v;
          if (v > globalPdMax) globalPdMax = v;
        }
      }
    }
  }
  if (globalPdMin === Infinity) { globalPdMin = 0; globalPdMax = 1; }

  // Compute global GND power density range — only GND meshes
  let globalGndPdMin = Infinity, globalGndPdMax = -Infinity;
  for (let li = 0; li < resultData.layerSolutions.length; li++) {
    for (const m of resultData.layerSolutions[li].meshes) {
      let mMax = -Infinity;
      for (const p of m.potentials) { if (p != null && isFinite(p) && p > mMax) mMax = p; }
      if (mMax >= vccVoltage * 0.3) continue; // Skip VCC meshes
      const pd = m.powerDensities || [];
      for (const v of pd) {
        if (v != null && isFinite(v) && v > 0) {
          if (v < globalGndPdMin) globalGndPdMin = v;
          if (v > globalGndPdMax) globalGndPdMax = v;
        }
      }
    }
  }
  if (globalGndPdMin === Infinity) { globalGndPdMin = 0; globalGndPdMax = 1; }

  for (let li = 0; li < resultData.layerSolutions.length; li++) {
    _log('buildBuffers', 'Layer ' + li + ' starting...');
    const ls = resultData.layerSolutions[li];
    const meshCount = ls.meshes.length;
    const discCount = ls.disconnectedMeshes ? ls.disconnectedMeshes.length : 0;
    meshDiagLines.push(`\n层${li} "${ls.layerName}": ${meshCount} 个已连接mesh, ${discCount} 个断开mesh`);
    for (let mi = 0; mi < meshCount; mi++) {
      const m = ls.meshes[mi];
      const pots = m.potentials || [];
      const verts = m.vertices || [];
      const tris = m.triangles || [];
      const vMin = pots.length > 0 ? Math.min(...pots) : 0;
      const vMax = pots.length > 0 ? Math.max(...pots) : 0;
      const cds = m.currentDensities || [];
      const pds = m.powerDensities || [];
      const hasCD = cds.length > 0;
      const hasPD = pds.length > 0;
      let cdInfo = hasCD ? '有' : '无';
      if (hasCD) {
        let cdMax = 0;
        for (const jv of cds) { const mag = Math.sqrt(jv[0]*jv[0]+jv[1]*jv[1]); if(mag>cdMax) cdMax=mag; }
        cdInfo += ` (max=${cdMax.toExponential(3)})`;
      }
      meshDiagLines.push(`  mesh[${mi}]: ${verts.length}顶点, ${tris.length}三角, 电压=[${vMin.toFixed(4)}, ${vMax.toFixed(4)}]V, 电流密度=${cdInfo}, 功率密度=${hasPD?'有':'无'}`);
    }
    if (discCount > 0) {
      for (let di = 0; di < ls.disconnectedMeshes.length; di++) {
        const dm = ls.disconnectedMeshes[di];
        const dVerts = dm.vertices || [];
        const dTris = dm.triangles || [];
        meshDiagLines.push(`  断开mesh[${di}]: ${dVerts.length}顶点, ${dTris.length}三角 (无求解数据)`);
      }
    }
    try {
      layerGL[li] = buildLayerBuffers(ls, li, globalVMin, globalVMax, globalPdMin, globalPdMax, globalGndPdMin, globalGndPdMax);
      _log('buildBuffers', 'Layer ' + li + ' OK, meshVBO=' + !!layerGL[li].meshVBO + ' discVBO=' + !!layerGL[li].discVBO);
    } catch (e) {
      _log('buildBuffers', 'Layer ' + li + ' CRASHED: ' + (e.message || e));
      layerGL[li] = {};
    }
  }

  // Add load voltage diagnostics at the top of meshDiagLines
  const loadDiagLines = [];
  loadDiagLines.push('========== 负载电压诊断 ==========');
  for (let li = 0; li < resultData.layerSolutions.length; li++) {
    const layerName = layerNamesList[li];
    for (const ni of networkInfoData) {
      const srcOnLayer = ni.sourcePads.filter(p => !p.layer || p.layer === layerName);
      const srcGndOnLayer = (ni.sourceGndPads || []).filter(p => !p.layer || p.layer === layerName);
      const loadOnLayer = ni.loadPads.filter(p => !p.layer || p.layer === layerName);
      const loadGndOnLayer = (ni.loadGndPads || []).filter(p => !p.layer || p.layer === layerName);
      if (srcOnLayer.length === 0 && srcGndOnLayer.length === 0 && loadOnLayer.length === 0 && loadGndOnLayer.length === 0) continue;
      let srcSum = 0, srcCnt = 0, loadSum = 0, loadCnt = 0;
      let srcGndSum = 0, srcGndCnt = 0, loadGndSum = 0, loadGndCnt = 0;
      for (const p of srcOnLayer) {
        const v = pickValueAtLayer(p.x, p.y, li);
        if (v != null && isFinite(v)) { srcSum += v; srcCnt++; }
      }
      for (const p of srcGndOnLayer) {
        const v = pickValueAtLayer(p.x, p.y, li);
        if (v != null && isFinite(v)) { srcGndSum += v; srcGndCnt++; }
      }
      for (const p of loadOnLayer) {
        const v = pickValueAtLayer(p.x, p.y, li);
        if (v != null && isFinite(v)) { loadSum += v; loadCnt++; }
      }
      for (const p of loadGndOnLayer) {
        const v = pickValueAtLayer(p.x, p.y, li);
        if (v != null && isFinite(v)) { loadGndSum += v; loadGndCnt++; }
      }
      loadDiagLines.push(`\n层${li} "${layerName}" 网络 "${ni.net}":`);
      if (srcCnt > 0) loadDiagLines.push(`  源端VCC: ${srcCnt} pads, 平均电压=${(srcSum/srcCnt).toFixed(6)} V`);
      else loadDiagLines.push(`  源端VCC: 该层无源端 pad`);
      if (srcGndCnt > 0) loadDiagLines.push(`  源端GND: ${srcGndCnt} pads, 平均电压=${(srcGndSum/srcGndCnt).toFixed(6)} V`);
      else loadDiagLines.push(`  源端GND: 该层无源端 GND pad`);
      for (const p of loadOnLayer) {
        const v = pickValueAtLayer(p.x, p.y, li);
        loadDiagLines.push(`  负载VCC pad (${p.x.toFixed(3)}, ${p.y.toFixed(3)}) => ${v != null ? v.toFixed(6) + ' V' : '未命中 mesh'}`);
      }
      for (const p of loadGndOnLayer) {
        const v = pickValueAtLayer(p.x, p.y, li);
        loadDiagLines.push(`  负载GND pad (${p.x.toFixed(3)}, ${p.y.toFixed(3)}) => ${v != null ? v.toExponential(6) + ' V' : '未命中 mesh'}`);
      }
      if (loadCnt > 0) {
        const avgLoad = loadSum / loadCnt;
        const srcV = srcCnt > 0 ? srcSum / srcCnt : vccVoltage;
        const drop = srcV - avgLoad;
        loadDiagLines.push(`  VCC压降: ${drop.toFixed(6)} V (${(drop/srcV*100).toFixed(2)}%)`);
      }
      if (loadCnt > 0 && loadGndCnt > 0) {
        const vccAtLoad = loadSum / loadCnt;
        const gndAtLoad = loadGndSum / loadGndCnt;
        const totalDrop = vccAtLoad - gndAtLoad;
        loadDiagLines.push(`  负载有效电压(VCC-GND): ${totalDrop.toFixed(6)} V (额定${ni.voltage}V)`);
      }
    }
  }
  meshDiagLines = [...loadDiagLines, '', ...meshDiagLines];
}

function buildLayerBuffers(ls, li, globalVMin, globalVMax, globalPdMin, globalPdMax, globalGndPdMin, globalGndPdMax) {
  const glData = {};
  let positions = [], voltages = [], powerDensities = [], indices = [];
  let offset = 0;
  // 记录���个 mesh 的顶点范围，用于独立归一化
  const meshVoltageRanges = [];
  const meshPDRanges = [];
  // 记录每个 mesh 的三角形索引范围，用于按网络选择性绘制
  const perMeshIdxRanges = [];
  for (let mi = 0; mi < ls.meshes.length; mi++) {
    const m = ls.meshes[mi];
    const mVerts = m.vertices || [];
    const mPots = m.potentials || [];
    const mTris = m.triangles || [];
    const n = mVerts.length;
    const vBase = voltages.length;
    const idxStart = indices.length;
    for (let i = 0; i < n; i++) {
      positions.push(vx(mVerts[i]), vy(mVerts[i]));
      voltages.push(mPots[i] != null && isFinite(mPots[i]) ? mPots[i] : 0);
    }
    // 记录此 mesh 的电压范围
    let mVMin = Infinity, mVMax = -Infinity;
    for (let i = vBase; i < voltages.length; i++) {
      if (voltages[i] < mVMin) mVMin = voltages[i];
      if (voltages[i] > mVMax) mVMax = voltages[i];
    }
    if (mVMin === Infinity) { mVMin = 0; mVMax = 1; }
    meshVoltageRanges.push({ vMin: mVMin, vMax: mVMax, start: vBase, count: n });
    console.log('[Results] buildLayerBuffers layer=' + li + ' mesh=' + mi + ': vRange=[' + mVMin.toFixed(6) + ', ' + mVMax.toFixed(6) + '], verts=' + n + ', tris=' + mTris.length);
    // Power density: may be per-face or per-vertex
    const pdBase = powerDensities.length;
    const pd = m.powerDensities || [];
    if (pd.length === mTris.length && pd.length !== mVerts.length) {
      // Per-face → average to per-vertex
      const vpds = new Array(n).fill(0);
      const vcnt = new Array(n).fill(0);
      for (let ti = 0; ti < mTris.length; ti++) {
        const tri = mTris[ti];
        const tv = Array.isArray(tri) ? tri : (tri.vertices || tri);
        if (!tv || tv.length < 3) continue;
        const val = pd[ti] != null && isFinite(pd[ti]) ? pd[ti] : 0;
        for (const vi of tv) { vpds[vi] += val; vcnt[vi]++; }
      }
      for (let i = 0; i < n; i++) powerDensities.push(vcnt[i] > 0 ? vpds[i] / vcnt[i] : 0);
    } else if (pd.length === n) {
      for (const v of pd) powerDensities.push(v != null && isFinite(v) ? v : 0);
    } else {
      for (let i = 0; i < n; i++) powerDensities.push(0);
    }
    // 记录此 mesh 的功率密度范围
    let mPdMin = Infinity, mPdMax = -Infinity;
    for (let i = pdBase; i < powerDensities.length; i++) {
      const v = powerDensities[i];
      if (v > 0) { if (v < mPdMin) mPdMin = v; if (v > mPdMax) mPdMax = v; }
    }
    if (mPdMin === Infinity) { mPdMin = 0; mPdMax = 1; }
    meshPDRanges.push({ pdMin: mPdMin, pdMax: mPdMax, start: pdBase, count: n });
    for (const tri of mTris) {
      const v = Array.isArray(tri) ? tri : (tri.vertices || tri);
      if (!v || v.length < 3) continue;
      indices.push(v[0]+offset, v[1]+offset, v[2]+offset);
    }
    perMeshIdxRanges.push({ start: idxStart, count: indices.length - idxStart });
    offset += n;
  }

  // === Build buffers that DON'T depend on connected mesh data (board, outline, disc, points) ===
  const lname = layerNamesList[li];

  // Connection points: the 过孔 button should only show actual vias.
  const cps = (connectionPoints[lname] || []).filter(cp => cp.kind === 'via');
  if (cps.length > 0) {
    const ptData = new Float32Array(cps.length * 6);
    for (let i = 0; i < cps.length; i++) {
      const cp = cps[i];
      const col = cp.is_source ? [1.0, 0.2, 0.2] : [0.2, 1.0, 0.4];
      ptData[i*6] = cp.x; ptData[i*6+1] = cp.y;
      ptData[i*6+2] = col[0]; ptData[i*6+3] = col[1]; ptData[i*6+4] = col[2];
      ptData[i*6+5] = cp.diameter || 0.5;
    }
    glData.pointVBO = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, glData.pointVBO);
    gl.bufferData(gl.ARRAY_BUFFER, ptData, gl.STATIC_DRAW);
    glData.pointCount = cps.length;
  }

  // Outlines
  const polys = layerBoundaries[lname] || [];
  const outlineVerts = [];
  for (const poly of polys) {
    const ext = poly.exterior;
    if (!ext || !Array.isArray(ext)) continue;
    for (let i = 0; i < ext.length - 1; i++) {
      outlineVerts.push(ext[i][0], ext[i][1], ext[i+1][0], ext[i+1][1]);
    }
    for (const hole of (poly.holes || [])) {
      if (!hole || !Array.isArray(hole)) continue;
      for (let i = 0; i < hole.length - 1; i++) {
        outlineVerts.push(hole[i][0], hole[i][1], hole[i+1][0], hole[i+1][1]);
      }
    }
  }
  if (outlineVerts.length > 0) {
    glData.outlineVBO = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, glData.outlineVBO);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(outlineVerts), gl.STATIC_DRAW);
    glData.outlineCount = outlineVerts.length / 4;
  }

  // Board copper fill: stencil-based polygon fill for copper pour shapes.
  // Exterior fans increment the stencil, hole fans decrement it, so overlapping
  // exteriors union correctly and holes are carved out.
  const boardStencilVerts = [];
  const boardStencilFans = [];
  for (const poly of polys) {
    const ext = poly.exterior;
    if (!ext || ext.length < 3) continue;
    const off = boardStencilVerts.length / 2;
    for (const pt of ext) boardStencilVerts.push(pt[0], pt[1]);
    boardStencilFans.push({ offset: off, count: ext.length, isHole: false });
    for (const hole of (poly.holes || [])) {
      if (hole.length < 3) continue;
      const hOff = boardStencilVerts.length / 2;
      for (const pt of hole) boardStencilVerts.push(pt[0], pt[1]);
      boardStencilFans.push({ offset: hOff, count: hole.length, isHole: true });
    }
  }
  if (boardStencilVerts.length > 0) {
    glData.copperStencilVBO = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, glData.copperStencilVBO);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(boardStencilVerts), gl.STATIC_DRAW);
    glData.copperStencilFans = boardStencilFans;
  }
  // Bounding box quad for stencil fill
  const bMargin = Math.max(bounds.maxX - bounds.minX, bounds.maxY - bounds.minY) * 0.05;
  const bx0 = bounds.minX - bMargin, by0 = bounds.minY - bMargin;
  const bx1 = bounds.maxX + bMargin, by1 = bounds.maxY + bMargin;
  glData.boardQuadVBO = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, glData.boardQuadVBO);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([bx0,by0, bx1,by0, bx1,by1, bx0,by1]), gl.STATIC_DRAW);
  glData.boardQuadIBO = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, glData.boardQuadIBO);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array([0,1,2, 0,2,3]), gl.STATIC_DRAW);

  // Disconnected meshes
  const discMeshes = ls.disconnectedMeshes || [];
  if (discMeshes.length > 0) {
    let discPos = [], discIdx = [], discOff = 0;
    for (const dm of discMeshes) {
      const dn = dm.vertices?.length || 0;
      for (let i = 0; i < dn; i++) {
        discPos.push(vx(dm.vertices[i]), vy(dm.vertices[i]));
      }
      for (const tri of (dm.triangles || [])) {
        const v = Array.isArray(tri) ? tri : (tri.vertices || tri);
        if (!v || v.length < 3) continue;
        discIdx.push(v[0]+discOff, v[1]+discOff, v[2]+discOff);
      }
      discOff += dn;
    }
    if (discPos.length > 0) {
      glData.discVBO = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, glData.discVBO);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(discPos), gl.STATIC_DRAW);
      glData.discIBO = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, glData.discIBO);
      const dNeed32 = discIdx.length >= 65536 && ext32bit;
      const dIdx = dNeed32 ? new Uint32Array(discIdx) : new Uint16Array(discIdx);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, dIdx, gl.STATIC_DRAW);
      glData.discIdxType = dNeed32 ? gl.UNSIGNED_INT : gl.UNSIGNED_SHORT;
      glData.discTriCount = discIdx.length;
    }
  }

  // === Early return if no connected mesh data ===
  if (positions.length === 0) {
    console.log('[Results] Layer', li, ': no connected mesh, board fill =', !!glData.copperStencilVBO, 'disc =', !!glData.discVBO);
    return glData;
  }

  // === Build connected mesh buffers ===
  // 计算源端电压和负载端电压
  let srcVoltage = null, loadVoltage = null;
  for (const ni of networkInfoData) {
    const srcOnLayer = ni.sourcePads.filter(p => !p.layer || p.layer === lname);
    const loadOnLayer = ni.loadPads.filter(p => !p.layer || p.layer === lname);
    let srcSum = 0, srcCnt = 0, loadSum = 0, loadCnt = 0;
    for (const sp of srcOnLayer) {
      let bestDist = Infinity, bestV = 0;
      for (let vi = 0; vi < positions.length / 2; vi++) {
        const dx = positions[vi * 2] - sp.x, dy = positions[vi * 2 + 1] - sp.y;
        const d = dx * dx + dy * dy;
        if (d < bestDist) { bestDist = d; bestV = voltages[vi]; }
      }
      if (bestDist < Infinity) { srcSum += bestV; srcCnt++; }
    }
    for (const lp of loadOnLayer) {
      let bestDist = Infinity, bestV = 0;
      for (let vi = 0; vi < positions.length / 2; vi++) {
        const dx = positions[vi * 2] - lp.x, dy = positions[vi * 2 + 1] - lp.y;
        const d = dx * dx + dy * dy;
        if (d < bestDist) { bestDist = d; bestV = voltages[vi]; }
      }
      if (bestDist < Infinity) { loadSum += bestV; loadCnt++; }
    }
    if (srcCnt > 0) srcVoltage = srcSum / srcCnt;
    if (loadCnt > 0) loadVoltage = loadSum / loadCnt;
  }

  // 根据是否是"全部"视图选择归一化方式
  const isAllNetworksView = isShowingAllNetworks();
  glData.vMin = globalVMin; glData.vMax = globalVMax;
  console.log('[Results] globalVRange=[' + globalVMin.toFixed(6) + ', ' + globalVMax.toFixed(6) + '], vccVoltage=' + vccVoltage.toFixed(4) + ', isAllNetworks=' + isAllNetworksView);
  glData.srcVoltage = srcVoltage; glData.loadVoltage = loadVoltage;

  const verts = new Float32Array(positions.length / 2 * 3);

  if (isAllNetworksView) {
    // 多网络"全部"视图：使用 per-mesh 归一化
    // 每个网络使用自己的电压范围，避免不同电压网络的颜色冲突
    for (let i = 0; i < voltages.length; i++) {
      const j = i * 3;
      verts[j] = positions[i * 2]; verts[j+1] = positions[i * 2 + 1];
      // Find which mesh this vertex belongs to and use that mesh's voltage range
      let t = 0.5;
      for (const mvr of meshVoltageRanges) {
        if (i >= mvr.start && i < mvr.start + mvr.count) {
          const mRange = mvr.vMax - mvr.vMin;
          t = mRange > 0 ? (voltages[i] - mvr.vMin) / mRange : 0.5;
          break;
        }
      }
      verts[j+2] = Math.max(0, Math.min(1, t));
    }
  } else {
    // 单网络视图：使用全局电压范围归一化
    // 这样可以看到从源到负载的电压下降趋势
    const globalVRange = globalVMax - globalVMin;
    for (let i = 0; i < voltages.length; i++) {
      const j = i * 3;
      verts[j] = positions[i * 2]; verts[j+1] = positions[i * 2 + 1];
      // 使用全局电压范围归一化，这样可以看到整体电压分布
      const t = globalVRange > 0 ? (voltages[i] - globalVMin) / globalVRange : 0.5;
      verts[j+2] = Math.max(0, Math.min(1, t));
    }
  }
  glData.meshVBO = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, glData.meshVBO);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

  // Power density — global log scale across all layers
  glData.pdMin = globalPdMin; glData.pdMax = globalPdMax;

  const logMin = globalPdMin > 0 ? Math.log10(globalPdMin) : (globalPdMax > 0 ? Math.log10(globalPdMax) - 1 : -50);
  const logMax = globalPdMax > 0 ? Math.log10(globalPdMax) : (globalPdMin > 0 ? Math.log10(globalPdMin) + 1 : -50);
  const logRange = logMax - logMin;

  const pdVerts = new Float32Array(powerDensities.length * 3);
  for (let i = 0; i < powerDensities.length; i++) {
    const j = i * 3;
    pdVerts[j] = positions[i * 2]; pdVerts[j+1] = positions[i * 2 + 1];
    const v = powerDensities[i];
    pdVerts[j+2] = v > 0 && logRange > 0 ? (Math.log10(v) - logMin) / logRange : 0.0;
  }
  glData.meshPDVBO = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, glData.meshPDVBO);
  gl.bufferData(gl.ARRAY_BUFFER, pdVerts, gl.STATIC_DRAW);

  // GND Power density — per-mesh identification + GND-only log scale
  glData.gndPdMin = globalGndPdMin; glData.gndPdMax = globalGndPdMax;
  const gndLogMin = globalGndPdMin > 0 ? Math.log10(globalGndPdMin) : (globalGndPdMax > 0 ? Math.log10(globalGndPdMax) - 1 : -50);
  const gndLogMax = globalGndPdMax > 0 ? Math.log10(globalGndPdMax) : (globalGndPdMin > 0 ? Math.log10(globalGndPdMin) + 1 : -50);
  const gndLogRange = gndLogMax - gndLogMin;
  const meshIsGnd = [];
  const gndPdVerts = new Float32Array(powerDensities.length * 3);
  for (let mi = 0; mi < meshVoltageRanges.length; mi++) {
    const mvr = meshVoltageRanges[mi];
    const isGnd = mvr.vMax < vccVoltage * 0.3;
    meshIsGnd.push(isGnd);
    for (let i = 0; i < mvr.count; i++) {
      const idx = mvr.start + i;
      const j = idx * 3;
      gndPdVerts[j] = positions[idx * 2]; gndPdVerts[j+1] = positions[idx * 2 + 1];
      if (isGnd) {
        const v = powerDensities[idx];
        gndPdVerts[j+2] = v > 0 && gndLogRange > 0 ? (Math.log10(v) - gndLogMin) / gndLogRange : 0.0;
      } else {
        gndPdVerts[j+2] = 0.0;
      }
    }
  }
  glData.meshIsGnd = meshIsGnd;
  glData.meshGndPDVBO = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, glData.meshGndPDVBO);
  gl.bufferData(gl.ARRAY_BUFFER, gndPdVerts, gl.STATIC_DRAW);



  // Index buffer with 32-bit extension check
  if (indices.length >= 65536 && !ext32bit) {
    console.warn('[Results] Large mesh without OES_element_index_uint — truncating');
    indices = indices.slice(0, 65532);
  }
  const need32 = indices.length >= 65536 && ext32bit;
  const idxArr = need32 ? new Uint32Array(indices) : new Uint16Array(indices);
  glData.meshIBO = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, glData.meshIBO);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, idxArr, gl.STATIC_DRAW);
  glData.indexType = need32 ? gl.UNSIGNED_INT : gl.UNSIGNED_SHORT;
  glData.triCount = indices.length;
  glData.perMeshIdxRanges = perMeshIdxRanges;

  // Edges
  const edgeSet = new Set();
  const edgeVerts = [];
  const posArr = new Float32Array(positions);
  for (let i = 0; i < indices.length; i += 3) {
    const a=indices[i], b=indices[i+1], c=indices[i+2];
    addEdge(a,b); addEdge(b,c); addEdge(c,a);
  }
  function addEdge(a,b) {
    const k = Math.min(a,b)+','+Math.max(a,b);
    if (edgeSet.has(k)) return;
    edgeSet.add(k);
    edgeVerts.push(posArr[a*2], posArr[a*2+1], posArr[b*2], posArr[b*2+1]);
  }
  if (edgeVerts.length > 0) {
    glData.edgeVBO = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, glData.edgeVBO);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(edgeVerts), gl.STATIC_DRAW);
    glData.edgeCount = edgeVerts.length / 4;
  }

  console.log('[Results] Layer', li, ': mesh OK, board =', !!glData.copperStencilVBO, 'fans =', glData.copperStencilFans?.length, 'disc =', !!glData.discVBO);

  // === Current flow arrows (按网格显示) ===
  const arrowVerts = [];
  let meshVtxOffset = 0;  // 追踪每个 mesh 的顶点偏移

  // 构建边界三角形集合（用于过滤边界密集箭头）
  // 边界三角形是指至少有一条边是边界边的三角形
  const boundaryTris = new Set();

  for (let mi = 0; mi < ls.meshes.length; mi++) {
    const m = ls.meshes[mi];
    const mTris2 = m.triangles || [];
    // 统计每条边的出现次数，出现次数为1的边是边界边
    const edgeCount = new Map();
    for (const tri of mTris2) {
      const tv = Array.isArray(tri) ? tri : (tri.vertices || tri);
      if (!tv || tv.length < 3) continue;
      // 三角形的三条边（顶点索引从小到大排序以确保一致性）
      const edges = [
        [Math.min(tv[0], tv[1]), Math.max(tv[0], tv[1])].join(','),
        [Math.min(tv[1], tv[2]), Math.max(tv[1], tv[2])].join(','),
        [Math.min(tv[2], tv[0]), Math.max(tv[2], tv[0])].join(',')
      ];
      for (const e of edges) {
        edgeCount.set(e, (edgeCount.get(e) || 0) + 1);
      }
    }
    // 找出边界边（只出现一次的边）
    const boundaryEdges = new Set();
    edgeCount.forEach((cnt, e) => {
      if (cnt === 1) boundaryEdges.add(e);
    });
    // 标记包含边界边的三角形
    let triIdx = 0;
    for (const tri of mTris2) {
      const tv = Array.isArray(tri) ? tri : (tri.vertices || tri);
      if (!tv || tv.length < 3) { triIdx++; continue; }
      const edges = [
        [Math.min(tv[0], tv[1]), Math.max(tv[0], tv[1])].join(','),
        [Math.min(tv[1], tv[2]), Math.max(tv[1], tv[2])].join(','),
        [Math.min(tv[2], tv[0]), Math.max(tv[2], tv[0])].join(',')
      ];
      let isBoundaryTri = false;
      for (const e of edges) {
        if (boundaryEdges.has(e)) { isBoundaryTri = true; break; }
      }
      if (isBoundaryTri) {
        boundaryTris.add(`${mi}_${triIdx}`);
      }
      triIdx++;
    }
  }

  console.log('[Results] Layer', li, ': boundary triangles =', boundaryTris.size);

  for (let mi = 0; mi < ls.meshes.length; mi++) {
    const m = ls.meshes[mi];
    const mTris3 = m.triangles || [];
    const mVerts = m.vertices || [];
    const mCD = m.currentDensities || [];
    // 跳过没有电流密度的 mesh
    if (mCD.length === 0) {
      meshVtxOffset += mVerts.length;
      continue;
    }

    let triIdx = 0;
    for (const tri of mTris3) {
      const tv = Array.isArray(tri) ? tri : (tri.vertices || tri);
      if (!tv || tv.length < 3) { triIdx++; continue; }

      // 边界三角形过滤：边界箭头保留约25%（减少密集边界的箭头数量）
      const isBoundary = boundaryTris.has(`${mi}_${triIdx}`);
      if (isBoundary && (triIdx + mi * 13) % 4 !== 0) {
        triIdx++;
        continue;
      }

      // 获取三角形三个顶点的坐标（考虑 mesh 偏移）
      const ax = positions[(tv[0] + meshVtxOffset) * 2], ay = positions[(tv[0] + meshVtxOffset) * 2 + 1];
      const bx = positions[(tv[1] + meshVtxOffset) * 2], by = positions[(tv[1] + meshVtxOffset) * 2 + 1];
      const cx = positions[(tv[2] + meshVtxOffset) * 2], cy = positions[(tv[2] + meshVtxOffset) * 2 + 1];

      // 计算三角形尺寸（使用最长边长度）
      const abLen = Math.sqrt((bx - ax) ** 2 + (by - ay) ** 2);
      const bcLen = Math.sqrt((cx - bx) ** 2 + (cy - by) ** 2);
      const caLen = Math.sqrt((ax - cx) ** 2 + (ay - cy) ** 2);
      const triSize = Math.max(abLen, bcLen, caLen);

      // 箭头密度控制：基于三角形大小的自适应采样
      // 三角形越小，采样间隔越大（密度越低）
      const baseThreshold = 2.0; // 基准阈值（毫米）
      const densityFactor = Math.max(0.25, arrowDensityLevel); // 确保最小为0.25
      const samplingInterval = Math.max(1, Math.floor(baseThreshold / (triSize * densityFactor + 0.001)));
      if (triIdx % samplingInterval !== 0) {
        triIdx++;
        continue;
      }

      // 三角形中心
      const cx_tri = (ax + bx + cx) / 3;
      const cy_tri = (ay + by + cy) / 3;

      // 获取三个顶点的电流密度向量并平均
      const cd_a = mCD[tv[0]] || [0, 0];
      const cd_b = mCD[tv[1]] || [0, 0];
      const cd_c = mCD[tv[2]] || [0, 0];
      const jx = (cd_a[0] + cd_b[0] + cd_c[0]) / 3;
      const jy = (cd_a[1] + cd_b[1] + cd_c[1]) / 3;

      // 计算电流密度幅值
      const mag = Math.sqrt(jx * jx + jy * jy);

      // 归一化方向
      const dirX = mag > 0 ? jx / mag : 0;
      const dirY = mag > 0 ? jy / mag : 0;

      // 箭头长度撑满三角形的一半，乘以用户设置的大小系数
      const arrowLen = triSize * 0.5 * arrowSizeLevel;

      // 箭头几何（主线 + 箭头头部）
      const headSize = triSize * 0.15 * arrowSizeLevel;

      // 主线（从箭尾到箭头基部）
      const tailX = cx_tri - dirX * arrowLen * 0.5;
      const tailY = cy_tri - dirY * arrowLen * 0.5;
      const tipX = cx_tri + dirX * arrowLen * 0.5;
      const tipY = cy_tri + dirY * arrowLen * 0.5;

      arrowVerts.push(tailX, tailY, tipX, tipY);

      // 箭头头部（V 形）
      const headBaseX = tipX - dirX * headSize;
      const headBaseY = tipY - dirY * headSize;
      const perpX = -dirY * headSize * 0.6;
      const perpY = dirX * headSize * 0.6;

      arrowVerts.push(headBaseX + perpX, headBaseY + perpY, tipX, tipY);
      arrowVerts.push(headBaseX - perpX, headBaseY - perpY, tipX, tipY);
      triIdx++;
    }
    // 更新偏移，指向下一个 mesh 的起始位置
    meshVtxOffset += mVerts.length;
  }

  if (arrowVerts.length > 0) {
    glData.arrowVBO = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, glData.arrowVBO);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(arrowVerts), gl.STATIC_DRAW);
    glData.arrowLineCount = arrowVerts.length / 4;
    console.log('[Results] Layer', li, ': arrows =', glData.arrowLineCount, ', density =', arrowDensityLevel, ', size =', arrowSizeLevel, ', boundaryTris =', boundaryTris.size, ', meshVtxOffset =', meshVtxOffset);
  }


  return glData;
}

// ============================================================
// View / MVP
// ============================================================
function resetView() {
  viewCX = (bounds.minX + bounds.maxX) / 2;
  viewCY = (bounds.minY + bounds.maxY) / 2;
  const w = bounds.maxX - bounds.minX || 1;
  const h = bounds.maxY - bounds.minY || 1;
  viewZoom = Math.min(1.8 / w, 1.8 / h) * 0.92;
}

function computeMVP() {
  const aspect = canvas.width / canvas.height;
  const s = viewZoom;
  return new Float32Array([
    s / aspect, 0, 0, 0,
    0, s, 0, 0,
    0, 0, 1, 0,
    -s * viewCX / aspect, -s * viewCY, 0, 1
  ]);
}

function screenToWorld(sx, sy) {
  const aspect = canvas.width / canvas.height;
  const cssW = canvas.clientWidth || canvas.width;
  const cssH = canvas.clientHeight || canvas.height;
  const clipX = (sx / cssW) * 2 - 1;
  const clipY = 1 - (sy / cssH) * 2;
  return {
    x: clipX * aspect / viewZoom + viewCX,
    y: clipY / viewZoom + viewCY
  };
}

// ============================================================
// Render
// ============================================================
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = Math.round(rect.width * dpr);
  const h = Math.round(rect.height * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
  }
}

function render() {
  if (!gl) return;
  resizeCanvas();
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.clear(gl.COLOR_BUFFER_BIT);

  const mvp = computeMVP();

  // Render visible layers; the currently selected layer is rendered LAST (on top)
  // so the user can always see and hover over the selected layer's data
  for (let li = 0; li < layerNamesList.length; li++) {
    if (!layerVisible[li] || li === currentLayerIdx) continue;
    renderSingleLayer(li, mvp);
  }
  // Selected layer always on top
  if (layerVisible[currentLayerIdx]) {
    renderSingleLayer(currentLayerIdx, mvp);
  }

}

function renderSingleLayer(li, mvp) {
  const gd = layerGL[li];
  if (!gd || (!gd.meshVBO && !gd.copperStencilVBO)) return;

  // 0) Copper pour fill - only for the currently selected layer so the back-side
  // stencil does not clutter/obscure the layer being inspected.
  if (li === currentLayerIdx && gd.copperStencilVBO && gd.copperStencilFans && gd.boardQuadVBO) {
    gl.enable(gl.STENCIL_TEST);
    gl.clearStencil(0);
    gl.clear(gl.STENCIL_BUFFER_BIT);

    gl.stencilFunc(gl.ALWAYS, 0, 0xFF);
    gl.colorMask(false, false, false, false);

    gl.useProgram(lineProg.prog);
    gl.uniformMatrix4fv(lineProg.u.u_mvp, false, mvp);
    gl.bindBuffer(gl.ARRAY_BUFFER, gd.copperStencilVBO);
    gl.enableVertexAttribArray(lineProg.a.a_pos);
    gl.vertexAttribPointer(lineProg.a.a_pos, 2, gl.FLOAT, false, 0, 0);

    // Exterior fans increment the stencil.
    gl.stencilOp(gl.KEEP, gl.KEEP, gl.INCR);
    for (const fan of gd.copperStencilFans) {
      if (!fan.isHole) {
        gl.drawArrays(gl.TRIANGLE_FAN, fan.offset, fan.count);
      }
    }
    // Hole fans decrement the stencil.
    gl.stencilOp(gl.KEEP, gl.KEEP, gl.DECR);
    for (const fan of gd.copperStencilFans) {
      if (fan.isHole) {
        gl.drawArrays(gl.TRIANGLE_FAN, fan.offset, fan.count);
      }
    }

    gl.colorMask(true, true, true, true);
    gl.stencilFunc(gl.NOTEQUAL, 0, 0xFF);
    gl.stencilOp(gl.KEEP, gl.KEEP, gl.KEEP);
    // In copper_coverage mode, use cold gray for areas without current
    if (currentViewMode === 'copper_coverage') {
      gl.uniform4f(lineProg.u.u_color, 0.15, 0.18, 0.22, 1.0); // Cold gray
    } else {
      gl.uniform4f(lineProg.u.u_color, 0.22, 0.32, 0.25, 1.0); // Light green context
    }
    gl.bindBuffer(gl.ARRAY_BUFFER, gd.boardQuadVBO);
    gl.vertexAttribPointer(lineProg.a.a_pos, 2, gl.FLOAT, false, 0, 0);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, gd.boardQuadIBO);
    gl.drawElements(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT, 0);

    gl.disableVertexAttribArray(lineProg.a.a_pos);
    gl.disable(gl.STENCIL_TEST);
  }

  // 1) Mesh triangles — per-mesh rendering with VCC/GND colormaps
  console.log('[Results] mesh render check: meshVBO=' + !!gd.meshVBO + ', prog=' + !!meshProg.prog + ', perMeshIdxRanges=' + (gd.perMeshIdxRanges ? gd.perMeshIdxRanges.length : 'null') + ', meshIsGnd=' + JSON.stringify(gd.meshIsGnd));
  if (gd.meshVBO && meshProg.prog && gd.perMeshIdxRanges) {
    gl.useProgram(meshProg.prog);
    gl.uniformMatrix4fv(meshProg.u.u_mvp, false, mvp);
    gl.uniform1f(meshProg.u.u_alpha, 1.0);

    // Select VBO based on view mode
    let activeVBO = gd.meshVBO;
    if (currentViewMode === 'power') activeVBO = gd.meshPDVBO;
    else if (currentViewMode === 'gnd_power') activeVBO = gd.meshGndPDVBO || gd.meshVBO;
    gl.bindBuffer(gl.ARRAY_BUFFER, activeVBO);
    const stride = 3 * 4;
    gl.enableVertexAttribArray(meshProg.a.a_pos);
    gl.vertexAttribPointer(meshProg.a.a_pos, 2, gl.FLOAT, false, stride, 0);
    gl.enableVertexAttribArray(meshProg.a.a_val);
    gl.vertexAttribPointer(meshProg.a.a_val, 1, gl.FLOAT, false, stride, 8);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, gd.meshIBO);

    const idxSize = gd.indexType === gl.UNSIGNED_INT ? 4 : 2;

    // In copper_coverage mode: VCC uses heatmap, GND uses solid color
    if (currentViewMode === 'copper_coverage') {
      // First, render VCC meshes with heatmap (using voltage colormap)
      for (let mi = 0; mi < gd.perMeshIdxRanges.length; mi++) {
        const range = gd.perMeshIdxRanges[mi];
        let isGndMesh = gd.meshIsGnd && gd.meshIsGnd[mi];
        // Skip GND meshes in first pass
        if (isGndMesh) continue;
        // Render VCC mesh with colormap
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, cmapTex);
        gl.uniform1i(meshProg.u.u_cmap, 0);
        gl.drawElements(gl.TRIANGLES, range.count, gd.indexType, range.start * idxSize);
      }
      // Then, render GND meshes with solid purple color
      const gndColor = new Uint8Array(256 * 4);
      for (let i = 0; i < 256; i++) {
        gndColor[i*4] = Math.round(0.6 * 255);
        gndColor[i*4+1] = Math.round(0.5 * 255);
        gndColor[i*4+2] = Math.round(0.7 * 255);
        gndColor[i*4+3] = 255;
      }
      gl.bindTexture(gl.TEXTURE_2D, cmapTex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 256, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, gndColor);
      for (let mi = 0; mi < gd.perMeshIdxRanges.length; mi++) {
        const range = gd.perMeshIdxRanges[mi];
        let isGndMesh = gd.meshIsGnd && gd.meshIsGnd[mi];
        // Only render GND meshes
        if (!isGndMesh) continue;
        gl.activeTexture(gl.TEXTURE0);
        gl.uniform1i(meshProg.u.u_cmap, 0);
        gl.drawElements(gl.TRIANGLES, range.count, gd.indexType, range.start * idxSize);
      }
      // Restore original colormap after drawing
      updateCmapTexture();
    } else {
      // Normal colormap rendering
      for (let mi = 0; mi < gd.perMeshIdxRanges.length; mi++) {
        const range = gd.perMeshIdxRanges[mi];
        // In gnd_power mode, skip non-GND meshes
        if (currentViewMode === 'gnd_power' && gd.meshIsGnd && !gd.meshIsGnd[mi]) continue;
        // In voltage mode, skip GND meshes (only show VCC/power meshes)
        if (currentViewMode === 'voltage' && gd.meshIsGnd && gd.meshIsGnd[mi]) continue;
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, cmapTex);
        gl.uniform1i(meshProg.u.u_cmap, 0);
        gl.drawElements(gl.TRIANGLES, range.count, gd.indexType, range.start * idxSize);
      }
    }

    gl.disableVertexAttribArray(meshProg.a.a_val);

  }

  // 1.5) Disconnected meshes — render with the same color as the copper
  // context fill so they blend seamlessly. These are small copper polygons
  // isolated during same-net union, with no solver data.
  if (gd.discVBO && gd.discIBO) {
    gl.useProgram(lineProg.prog);
    gl.uniformMatrix4fv(lineProg.u.u_mvp, false, mvp);
    gl.uniform4f(lineProg.u.u_color, 0.22, 0.32, 0.25, 1.0); // Same as context fill
    gl.bindBuffer(gl.ARRAY_BUFFER, gd.discVBO);
    gl.enableVertexAttribArray(lineProg.a.a_pos);
    gl.vertexAttribPointer(lineProg.a.a_pos, 2, gl.FLOAT, false, 0, 0);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, gd.discIBO);
    gl.drawElements(gl.TRIANGLES, gd.discTriCount, gd.discIdxType, 0);
    gl.disableVertexAttribArray(lineProg.a.a_pos);
  }

  // 2) Mesh edges
  if (showEdges && gd.edgeVBO) {
    gl.useProgram(lineProg.prog);
    gl.uniformMatrix4fv(lineProg.u.u_mvp, false, mvp);
    gl.uniform4f(lineProg.u.u_color, 0.4, 0.4, 0.5, 0.25);
    gl.bindBuffer(gl.ARRAY_BUFFER, gd.edgeVBO);
    gl.enableVertexAttribArray(lineProg.a.a_pos);
    gl.vertexAttribPointer(lineProg.a.a_pos, 2, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.LINES, 0, gd.edgeCount * 2);
    gl.disableVertexAttribArray(lineProg.a.a_pos);
  }

  // 3) Polygon outlines
  if (showOutline && gd.outlineVBO) {
    gl.useProgram(lineProg.prog);
    gl.uniformMatrix4fv(lineProg.u.u_mvp, false, mvp);
    gl.uniform4f(lineProg.u.u_color, 0.0, 0.83, 1.0, 0.7);
    gl.bindBuffer(gl.ARRAY_BUFFER, gd.outlineVBO);
    gl.enableVertexAttribArray(lineProg.a.a_pos);
    gl.vertexAttribPointer(lineProg.a.a_pos, 2, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.LINES, 0, gd.outlineCount * 2);
    gl.disableVertexAttribArray(lineProg.a.a_pos);
  }

  // 4) Connection points
  if (showVias && gd.pointVBO) {
    gl.useProgram(pointProg.prog);
    gl.uniformMatrix4fv(pointProg.u.u_mvp, false, mvp);
    // Vertical world height = 2 / viewZoom; canvas.height pixels cover it.
    const worldToPx = 2 / (viewZoom * canvas.height);
    gl.uniform1f(pointProg.u.u_worldToPx, worldToPx);
    gl.bindBuffer(gl.ARRAY_BUFFER, gd.pointVBO);
    const ptStride = 6 * 4;
    gl.enableVertexAttribArray(pointProg.a.a_pos);
    gl.vertexAttribPointer(pointProg.a.a_pos, 2, gl.FLOAT, false, ptStride, 0);
    gl.enableVertexAttribArray(pointProg.a.a_col);
    gl.vertexAttribPointer(pointProg.a.a_col, 3, gl.FLOAT, false, ptStride, 8);
    gl.enableVertexAttribArray(pointProg.a.a_dia);
    gl.vertexAttribPointer(pointProg.a.a_dia, 1, gl.FLOAT, false, ptStride, 20);
    gl.drawArrays(gl.POINTS, 0, gd.pointCount);
    gl.disableVertexAttribArray(pointProg.a.a_pos);
    gl.disableVertexAttribArray(pointProg.a.a_col);
    gl.disableVertexAttribArray(pointProg.a.a_dia);
  }

  // 5) Current flow arrows
  if (showCurrentFlow && gd.arrowVBO) {
    gl.useProgram(lineProg.prog);
    gl.uniformMatrix4fv(lineProg.u.u_mvp, false, mvp);
    gl.bindBuffer(gl.ARRAY_BUFFER, gd.arrowVBO);
    gl.enableVertexAttribArray(lineProg.a.a_pos);
    gl.vertexAttribPointer(lineProg.a.a_pos, 2, gl.FLOAT, false, 0, 0);
    // Outline pass (dark) - 使箭头在任意背景下可见
    gl.lineWidth(2.5);
    gl.uniform4f(lineProg.u.u_color, 0.0, 0.0, 0.0, 0.8);
    gl.drawArrays(gl.LINES, 0, gd.arrowLineCount * 2);
    // Arrow pass (bright) - 始终使用亮绿色
    gl.lineWidth(1.2);
    gl.uniform4f(lineProg.u.u_color, 0.2, 1.0, 0.4, 1.0); // 亮绿色
    gl.drawArrays(gl.LINES, 0, gd.arrowLineCount * 2);
    gl.lineWidth(1.0);
    gl.disableVertexAttribArray(lineProg.a.a_pos);
  }
}



// ============================================================
// Interaction
// ============================================================
function setupInteraction() {
  canvas.addEventListener('mousedown', e => {
    if (e.button === 0 || e.button === 1) { isDrag = true; lastMX = e.offsetX; lastMY = e.offsetY; e.preventDefault(); canvas.style.cursor = 'grabbing'; }
  });
  window.addEventListener('mouseup', e => { if (e.button === 0 || e.button === 1) { isDrag = false; canvas.style.cursor = 'crosshair'; } });
  canvas.addEventListener('auxclick', e => e.preventDefault());
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  canvas.addEventListener('mousemove', e => {
    if (isDrag) {
      const aspect = canvas.width / canvas.height;
      const cssW = canvas.clientWidth || canvas.width;
      const cssH = canvas.clientHeight || canvas.height;
      viewCX -= (e.offsetX - lastMX) * 2 * aspect / (viewZoom * cssW);
      viewCY += (e.offsetY - lastMY) * 2 / (viewZoom * cssH);
      lastMX = e.offsetX; lastMY = e.offsetY;
      render();
    }
    tooltipEvent = e;
    updateStatus(e.offsetX, e.offsetY);
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const before = screenToWorld(e.offsetX, e.offsetY);
    viewZoom *= e.deltaY > 0 ? 0.9 : 1.1;
    viewZoom = Math.max(0.0001, Math.min(10000, viewZoom));
    const after = screenToWorld(e.offsetX, e.offsetY);
    viewCX += before.x - after.x;
    viewCY += before.y - after.y;
    render();
  }, { passive: false });

  window.addEventListener('keydown', e => {
    if (e.key === 'e' || e.key === 'E') { showEdges = !showEdges; updateToggles(); render(); }
    if (e.key === 'o' || e.key === 'O') { showOutline = !showOutline; updateToggles(); render(); }
    if (e.key === 'v' || e.key === 'V') toggleLayer();
    if (e.key === 'r' || e.key === 'R') { resetView(); render(); }
    if (e.key === 'c' || e.key === 'C') { showVias = !showVias; updateToggles(); render(); }
    if (e.key === 'f' || e.key === 'F') { showCurrentFlow = !showCurrentFlow; updateToggles(); render(); }
    if (e.key === 'd' || e.key === 'D') {
      // 循环切换箭头密度: 0.25 -> 0.5 -> 1 -> 2 -> 4 -> 0.25
      const densityLevels = [0.25, 0.5, 1, 2, 4];
      const currentIdx = densityLevels.findIndex(d => d === arrowDensityLevel);
      const nextIdx = (currentIdx + 1) % densityLevels.length;
      arrowDensityLevel = densityLevels[nextIdx];
      // 更新UI
      const select = document.getElementById('arrow-density');
      if (select) select.value = arrowDensityLevel;
      console.log('[Results] Arrow density (D key):', arrowDensityLevel);
      // 重建箭头缓冲并重新渲染
      if (useWebGL && resultData) {
        buildAllLayerBuffers();
        render();
      }
    }
    if (e.key === 'p' || e.key === 'P') toggleViewMode();
    if (e.key === 'g' || e.key === 'G') { document.getElementById('btn-gndpower').click(); }
    if (e.key === 'm' || e.key === 'M') { document.getElementById('btn-copper').click(); }
  });

  window.addEventListener('resize', render);
}

// Check if current result is "all networks" combined view
function isShowingAllNetworks() {
  if (!resultSet || !resultSet.results) return false;
  const currentLabel = resultSet.results[currentResultIdx]?.label || '';
  return currentLabel.includes('全部') || currentLabel.toLowerCase().includes('all');
}

function updateStatus(mx, my) {
  const w = screenToWorld(mx, my);
  document.getElementById('st-pos').textContent = `X: ${w.x.toFixed(3)}  Y: ${w.y.toFixed(3)}`;

  // Hide voltage display when showing all networks (multi-network view)
  const isAll = isShowingAllNetworks();
  if (isAll) {
    document.getElementById('st-voltage').classList.add('hidden');
    document.getElementById('st-delta').classList.add('hidden');
    // Keep tooltip working even in all-networks mode
    const value = pickValue(w.x, w.y);
    updateTooltip(value, w);
    return;
  } else {
    document.getElementById('st-voltage').classList.remove('hidden');
    document.getElementById('st-delta').classList.remove('hidden');
  }

  const gd = layerGL[currentLayerIdx];
  if (!gd) { updateTooltip(null, w); return; }

  const value = pickValue(w.x, w.y);
  if (value != null && isFinite(value)) {
    if (currentViewMode === 'power' || currentViewMode === 'gnd_power') {
      document.getElementById('st-voltage').textContent = `功率密度: ${value.toExponential(4)} W/mm²`;
      const pdMin = currentViewMode === 'gnd_power' ? (gd.gndPdMin || 0) : (gd.pdMin || 0);
      document.getElementById('st-delta').textContent = `Δ: ${(value > 0 ? value - pdMin : 0).toExponential(4)} W/mm²`;
    } else {
      document.getElementById('st-voltage').textContent = `电压: ${value.toFixed(6)} V`;
      const delta = value - (gd.vMin || 0);
      document.getElementById('st-delta').textContent = `Δ: ${delta.toFixed(6)} V`;
    }
  } else {
    document.getElementById('st-voltage').textContent = (currentViewMode === 'power' || currentViewMode === 'gnd_power') ? '功率密度: --' : '电压: --';
    document.getElementById('st-delta').textContent = 'Δ: --';
  }
  updateTooltip(value, w);
}

// Find the network name at the given position by matching mesh average voltage
function findNetworkNameAt(wx, wy, layerIdx) {
  if (!networkInfoData || networkInfoData.length === 0) return null;
  if (layerIdx < 0 || layerIdx >= resultData.layerSolutions.length) return null;

  const ls = resultData.layerSolutions[layerIdx];

  // Find the mesh containing the cursor position and get its average voltage
  for (let mi = 0; mi < ls.meshes.length; mi++) {
    const m = ls.meshes[mi];

    // Check if cursor is inside this mesh
    for (let i = 0; i < m.triangles.length; i++) {
      const tri = m.triangles[i];
      const tv = Array.isArray(tri) ? tri : (tri.vertices || tri);
      if (!tv || tv.length < 3) continue;

      const ax = vx(m.vertices[tv[0]]), ay = vy(m.vertices[tv[0]]);
      const bx = vx(m.vertices[tv[1]]), by = vy(m.vertices[tv[1]]);
      const cx = vx(m.vertices[tv[2]]), cy = vy(m.vertices[tv[2]]);
      const tMinX = Math.min(ax,bx,cx), tMaxX = Math.max(ax,bx,cx);
      const tMinY = Math.min(ay,by,cy), tMaxY = Math.max(ay,by,cy);

      if (wx < tMinX || wx > tMaxX || wy < tMinY || wy > tMaxY) continue;

      const denom = (by-cy)*(ax-cx) + (cx-bx)*(ay-cy);
      if (Math.abs(denom) < 1e-12) continue;
      const la = ((by-cy)*(wx-cx) + (cx-bx)*(wy-cy)) / denom;
      const lb = ((cy-ay)*(wx-cx) + (ax-cx)*(wy-cy)) / denom;
      const lc = 1 - la - lb;
      if (la >= -0.001 && lb >= -0.001 && lc >= -0.001) {
        // Interpolate voltage at the cursor position for accurate net detection.
        const va = m.potentials[tv[0]], vb = m.potentials[tv[1]], vc = m.potentials[tv[2]];
        if (va == null || vb == null || vc == null) continue;
        const hitV = la * va + lb * vb + lc * vc;

        // Match with network by voltage
        // GND networks have voltage near 0
        if (hitV < vccVoltage * 0.3) {
          // Find GND network
          for (const ni of networkInfoData) {
            if (ni.gnd_net) {
              const nameUp = ni.gnd_net.toUpperCase();
              return nameUp.includes('GND') ? ni.gnd_net : ni.gnd_net + ' (GND)';
            }
          }
          return 'GND';
        }

        // VCC network - match by voltage
        let bestMatch = null;
        let minVDiff = Infinity;
        for (const ni of networkInfoData) {
          const vDiff = Math.abs(ni.voltage - hitV);
          if (vDiff < minVDiff) {
            minVDiff = vDiff;
            bestMatch = ni.name;
          }
        }
        // Only return match if voltage difference is reasonable (within 0.5V)
        if (bestMatch && minVDiff < 0.5) {
          return bestMatch;
        }
        return bestMatch;
      }
    }
  }
  return null;
}

function pickValue(wx, wy) {
  return pickValueAtLayer(wx, wy, currentLayerIdx);
}

function pickValueAtLayer(wx, wy, layerIdx) {
  if (layerIdx < 0 || layerIdx >= resultData.layerSolutions.length) return null;
  const ls = resultData.layerSolutions[layerIdx];
  for (let mi = 0; mi < ls.meshes.length; mi++) {
    const m = ls.meshes[mi];
    const values = (currentViewMode === 'power' || currentViewMode === 'gnd_power') ? (m.powerDensities || []) : m.potentials;
    // Skip non-GND meshes in gnd_power mode
    if (currentViewMode === 'gnd_power') {
      const gd = layerGL[layerIdx];
      if (gd && gd.meshIsGnd && !gd.meshIsGnd[mi]) continue;
    }
    // If powerDensities is per-face, use per-face lookup
    const isPerFace = (currentViewMode === 'power' || currentViewMode === 'gnd_power') && values.length === m.triangles.length && values.length !== m.vertices.length;
    for (let i = 0; i < m.triangles.length; i++) {
      const tri = m.triangles[i];
      const tv = Array.isArray(tri) ? tri : (tri.vertices || tri);
      if (!tv || tv.length < 3) continue;
      const ax = vx(m.vertices[tv[0]]), ay = vy(m.vertices[tv[0]]);
      const bx = vx(m.vertices[tv[1]]), by = vy(m.vertices[tv[1]]);
      const cx = vx(m.vertices[tv[2]]), cy = vy(m.vertices[tv[2]]);
      const tMinX = Math.min(ax,bx,cx), tMaxX = Math.max(ax,bx,cx);
      const tMinY = Math.min(ay,by,cy), tMaxY = Math.max(ay,by,cy);
      if (wx < tMinX || wx > tMaxX || wy < tMinY || wy > tMaxY) continue;
      const denom = (by-cy)*(ax-cx) + (cx-bx)*(ay-cy);
      if (Math.abs(denom) < 1e-12) continue;
      const la = ((by-cy)*(wx-cx) + (cx-bx)*(wy-cy)) / denom;
      const lb = ((cy-ay)*(wx-cx) + (ax-cx)*(wy-cy)) / denom;
      const lc = 1 - la - lb;
      if (la >= -0.001 && lb >= -0.001 && lc >= -0.001) {
        if (isPerFace) {
          const v = values[i];
          return v != null && isFinite(v) ? v : null;
        }
        const va = values[tv[0]], vb = values[tv[1]], vc = values[tv[2]];
        if (va != null && vb != null && vc != null)
          return la*va + lb*vb + lc*vc;
      }
    }
  }
  return null;
}

let tooltipEvent = null;
function updateTooltip(voltage, w) {
  const el = document.getElementById('tooltip');
  if (!tooltipEvent || !resultData) { el.style.display = 'none'; return; }
  if (voltage != null && isFinite(voltage)) {
    let valStr;
    if (currentViewMode === 'power' || currentViewMode === 'gnd_power') {
      valStr = `VCC: ${voltage.toExponential(4)} W/mm²`;
    } else {
      valStr = `VCC: ${voltage.toFixed(6)} V`;
    }

    // Try to find network name by matching mesh voltage
    let netInfo = '';
    const netName = findNetworkNameAt(w.x, w.y, currentLayerIdx);
    if (netName) {
      netInfo = `<br><span style="color:#58a6ff">Net: ${netName}</span>`;
    }

    el.innerHTML = `${valStr}${netInfo}<br><span style="color:#8b949e">X: ${w.x.toFixed(3)} Y: ${w.y.toFixed(3)}</span>`;
    el.style.display = '';
  } else {
    el.style.display = 'none';
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const ox = tooltipEvent.clientX - rect.left + 14;
  const oy = tooltipEvent.clientY - rect.top - 10;
  el.style.left = ox + 'px';
  el.style.top = oy + 'px';
}

// ============================================================
// Result tabs (N+1 solver runs)
// ============================================================
// Result tabs (N+1 solver runs) - 显示所有结果标签，包括单网络
// ============================================================
function buildResultTabs() {
  const bar = document.getElementById('result-tabs');
  if (!bar || !resultSet || resultSet.results.length < 1) {
    if (bar) bar.style.display = 'none';
    return;
  }

  bar.style.display = 'flex';
  bar.innerHTML = '';

  // 即使只有一个结果也显示标签，让用户知道当前网络名称

  for (let i = 0; i < resultSet.results.length; i++) {
    const btn = document.createElement('button');
    btn.textContent = resultSet.results[i].label;
    if (i === currentResultIdx) btn.className = 'active';
    btn.addEventListener('click', () => switchResult(i));
    bar.appendChild(btn);
  }
}

function switchResult(idx) {
  if (idx === currentResultIdx) return;
  if (!loadResult(idx)) return;
  buildResultTabs();
  buildSidebar();
  onLayerChange();
  // Update voltage display visibility based on result type
  const isAll = isShowingAllNetworks();
  _log('SwitchResult', 'idx=' + idx + ' label="' + (resultSet.results[idx]?.label || '') + '" isAll=' + isAll);
  if (isAll) {
    document.getElementById('st-voltage').classList.add('hidden');
    document.getElementById('st-delta').classList.add('hidden');
    _log('SwitchResult', 'HIDING voltage display');
  } else {
    document.getElementById('st-voltage').classList.remove('hidden');
    document.getElementById('st-delta').classList.remove('hidden');
    _log('SwitchResult', 'SHOWING voltage display');
  }

  // 更新警告按钮显示
  updateWarningButton();
}
