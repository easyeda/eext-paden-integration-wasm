<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PADEN WASM Host</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
  </style>
</head>
<body>
  <div id="status">Initializing WASM...</div>

  <script>
    (async function main() {
      const statusEl = document.getElementById('status');

      function setStatus(text) {
        statusEl.textContent = text;
        console.log('[WASM Host]', text);
      }

      function publishError(bus, error) {
        try {
          bus.publish('pdn-wasm-error', { error: String(error) });
        }
        catch (e) {
          console.error('[WASM Host] failed to publish error:', e);
        }
        setStatus('WASM init failed: ' + error);
      }

      // EasyEDA exposes eda as a global inside the extension iframe.
      const eda = window.eda;
      if (!eda || !eda.sys_FileSystem || !eda.sys_FileSystem.getExtensionFile) {
        setStatus('EasyEDA FileSystem API not available');
        throw new Error('eda.sys_FileSystem.getExtensionFile not available');
      }

      const bus = eda.sys_MessageBus;
      if (!bus) {
        setStatus('EasyEDA MessageBus not available');
        throw new Error('eda.sys_MessageBus not available');
      }

      try {
        setStatus('Loading extension assets...');

        async function getFile(uri) {
          const file = await eda.sys_FileSystem.getExtensionFile(uri);
          if (!file) {
            throw new Error(`Extension file not found: ${uri}`);
          }
          return file;
        }

        async function objectUrlFor(uri) {
          const file = await getFile(uri);
          return URL.createObjectURL(file);
        }

        async function textFor(uri) {
          const file = await getFile(uri);
          return file.text();
        }

        async function patchedClipperJsUrl() {
          const source = await textFor('/dist/clipper2z.js');
          const selfUrl = await objectUrlFor('/dist/clipper2z.js');
          // clipper2z.js is an ES module: it uses import.meta.url and ends with
          // "export default Clipper2Z;". Classic scripts loaded via importScripts()
          // do not support either. Patch it so the async function declaration
          // becomes a global function that the worker can use directly.
          const patched = source
            .replace(/import\.meta\.url/g, `"${selfUrl}"`)
            .replace(/export\s+default\s+Clipper2Z\s*;?\s*$/, '');
          const blob = new Blob([patched], { type: 'application/javascript' });
          return URL.createObjectURL(blob);
        }

        // Fetch all assets needed by the worker.
        const [
          clipperJsUrl,
          clipperWasmUrl,
          bridgeJsUrl,
          wasmExecUrl,
          padenWasmUrl,
          workerSource,
        ] = await Promise.all([
          patchedClipperJsUrl(),
          objectUrlFor('/dist/clipper2z.wasm'),
          objectUrlFor('/dist/wasm-geometry-bridge.js'),
          objectUrlFor('/dist/wasm_exec.js'),
          objectUrlFor('/dist/paden.wasm'),
          textFor('/ui/wasm-worker.js'),
        ]);

        // Inject asset URLs into the worker source and create a Blob URL.
        const workerScript = workerSource
          .replace(/__CLIPPER_JS_URL__/g, clipperJsUrl)
          .replace(/__CLIPPER_WASM_URL__/g, clipperWasmUrl)
          .replace(/__BRIDGE_JS_URL__/g, bridgeJsUrl)
          .replace(/__WASM_EXEC_URL__/g, wasmExecUrl)
          .replace(/__PADEN_WASM_URL__/g, padenWasmUrl);
        const workerBlob = new Blob([workerScript], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(workerBlob);

        setStatus('Starting WASM worker...');
        const worker = new Worker(workerUrl);

        let ready = false;

        worker.onmessage = (event) => {
          const msg = event.data;
          if (!msg || !msg.type) return;

          switch (msg.type) {
            case 'ready':
              ready = true;
              setStatus('WASM host ready');
              bus.publish('pdn-wasm-ready', {});
              break;
            case 'error':
              publishError(bus, msg.error);
              break;
            case 'analyze-result':
              if (msg.replyTopic) {
                bus.publish(msg.replyTopic, {
                  result: msg.result,
                  error: msg.error,
                });
              }
              break;
            case 'progress':
              bus.publish('pdn-wasm-progress', msg.progress);
              break;
          }
        };

        worker.onerror = (err) => {
          console.error('[WASM Host] worker error:', err);
          publishError(bus, err.message || 'worker error');
        };

        // Handle analyze requests from the extension.
        bus.subscribe('pdn-wasm-analyze', async (msg) => {
          const replyTopic = msg?.replyTopic;
          if (!replyTopic) return;

          try {
            const rawBytes = msg.gerberBytes;
            const configJson = msg.configJson;

            console.log('[WASM Host] analyze request received:', {
              rawType: typeof rawBytes,
              constructor: rawBytes?.constructor?.name,
              byteLength: rawBytes?.byteLength ?? rawBytes?.length ?? 'N/A',
              configLength: typeof configJson === 'string' ? configJson.length : 'N/A',
            });

            // Transfer the underlying ArrayBuffer to the worker for zero-copy.
            let gerberBuffer;
            if (rawBytes instanceof ArrayBuffer) {
              gerberBuffer = rawBytes;
            }
            else if (rawBytes?.buffer instanceof ArrayBuffer) {
              gerberBuffer = rawBytes.buffer;
            }
            else {
              throw new Error(`Unsupported gerberBytes type: ${typeof rawBytes}`);
            }

            worker.postMessage({
              type: 'analyze',
              gerberBytes: gerberBuffer,
              configJson,
              replyTopic,
            }, [gerberBuffer]);
          }
          catch (e) {
            console.error('[WASM Host] analyze failed:', e);
            bus.publish(replyTopic, { error: String(e) });
          }
        });
      }
      catch (e) {
        publishError(bus, e.message);
        console.error(e);
      }
    })();
  </script>
</body>
</html>
