<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PADEN WASM Host</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
  </style>
</head>
<body>
  <div id="status">Initializing WASM...</div>

  <!-- Go WASM runtime -->
  <script src="/dist/wasm_exec.js"></script>

  <!-- Geometry / Gerber / mesh bridge (bundles clipper2-wasm, tracespace, earcut) -->
  <script type="module" src="/dist/wasm-geometry-bridge.js"></script>

  <script type="module">
    const statusEl = document.getElementById('status');

    function setStatus(text) {
      statusEl.textContent = text;
      console.log('[WASM Host]', text);
    }

    async function initGeometryBridge() {
      // The module sets window.padenGeometry and starts clipper2-wasm init.
      while (!window.padenGeometry) {
        await new Promise(r => setTimeout(r, 10));
      }
      await window.padenGeometry.init();
      setStatus('Geometry bridge ready');
    }

    async function initGoWasm() {
      const go = new Go();
      const result = await WebAssembly.instantiateStreaming(
        fetch('/dist/paden.wasm'),
        go.importObject,
      );
      go.run(result.instance);
      setStatus('Go WASM ready');
    }

    function getMessageBus() {
      const bus = window.parent?.eda?.sys_MessageBus;
      if (!bus) {
        throw new Error('MessageBus not available in parent window');
      }
      return bus;
    }

    function publishReady() {
      try {
        getMessageBus().publish('pdn-wasm-ready', {});
      }
      catch (e) {
        console.error('[WASM Host] failed to publish ready:', e);
      }
      setStatus('WASM host ready');
    }

    function publishError(error) {
      try {
        getMessageBus().publish('pdn-wasm-error', { error: String(error) });
      }
      catch (e) {
        console.error('[WASM Host] failed to publish error:', e);
      }
      setStatus('WASM init failed: ' + error);
    }

    function setupAnalyzeHandler() {
      const bus = getMessageBus();
      bus.subscribe('pdn-wasm-analyze', async (msg) => {
        const replyTopic = msg?.replyTopic;
        if (!replyTopic) return;

        try {
          const gerberBytes = msg.gerberBytes;
          const configJson = msg.configJson;
          const result = await window.padne.analyzeGerber(gerberBytes, configJson);
          bus.publish(replyTopic, { result });
        }
        catch (e) {
          bus.publish(replyTopic, { error: String(e) });
        }
      });
    }

    async function main() {
      try {
        await Promise.all([initGeometryBridge(), initGoWasm()]);
        setupAnalyzeHandler();
        publishReady();
      }
      catch (e) {
        publishError(e.message);
        console.error(e);
      }
    }

    main();
  </script>
</body>
</html>
