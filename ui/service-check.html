            raise KeyError("Face not in mesh")
        if face in self.mesh.boundaries:
            return 0.0
        return self.values[face.i]

    def __setitem__(self, face: Face, value: float) -> None:
        if face not in self.mesh.faces:
            raise KeyError("Face not in mesh.faces")
        self.values[face.i] = value

    def __add__(self, other: "TwoForm") -> "TwoForm":
        if self.mesh is not other.mesh:
            raise ValueError("Cannot add TwoForms on different meshes")
        result = TwoForm(self.mesh)
        result.values = [a + b for a, b in zip(self.values, other.values)]
        return result

    def __sub__(self, other: "TwoForm") -> "TwoForm":
        if self.mesh is not other.mesh:
            raise ValueError("Cannot subtract TwoForms on different meshes")
        result = TwoForm(self.mesh)
        result.values = [a - b for a, b in zip(self.values, other.values)]
        return result

    def __mul__(self, scalar: float) -> "TwoForm":
        result = TwoForm(self.mesh)
        result.values = [v * scalar for v in self.values]
        return result

    def __rmul__(self, scalar: float) -> "TwoForm":
        return self.__mul__(scalar)

    def __truediv__(self, scalar: float) -> "TwoForm":
        if scalar == 0:
            raise ZeroDivisionError("Cannot divide TwoForm by zero")
        result = TwoForm(self.mesh)
        result.values = [v / scalar for v in self.values]
        return result

    def __neg__(self) -> "TwoForm":
        result = TwoForm(self.mesh)
        result.values = [-v for v in self.values]
        return result


class MeshingException(RuntimeError):
    pass


class Mesher:
    @dataclass(frozen=True)
    class Config:
        minimum_angle: float = 20.0
        maximum_size: float = 1.2  # 优化：从 0.6 增加到 1.2mm，减少约50%网格顶点
        variable_density_min_distance: float = 0.5
        variable_density_max_distance: float = 5.0  # 优化：从 3.0 增加到 5.0mm
        variable_size_maximum_factor: float = 5.0  # 优化：从 3.0 增加到 5.0，允许更大的网格变化
        distance_map_quantization: float = 1.0

        RELAXED = None

        @property
        def is_variable_density(self) -> bool:
            return self.variable_size_maximum_factor != 1.0

    def __init__(self, config: Optional["Mesher.Config"] = None):
        self.config = config if config is not None else Mesher.Config()

    def poly_to_mesh(self, poly: shapely.geometry.Polygon,
                     seed_points: List[Point] = []) -> Mesh:
        if poly.is_empty or poly.area < 1e-10:
            return Mesh()

        if self.config.maximum_size <= 0:
            return self._earcut_triangulate(poly)

        # Fix self-intersections from Gerber→Shapely conversion without
        # morphological change.  buffer(0) only fixes topology; the previous
        # buffer(0.005).buffer(-0.005) morphological opening could sever
        # narrow bridges in complex copper pours on large PCBs.
        cleaned = poly.buffer(0)
        if not cleaned.is_empty and cleaned.area > 1e-10:
            if cleaned.geom_type == 'Polygon':
                poly = cleaned
            elif cleaned.geom_type == 'MultiPolygon':
                # Keep ALL fragments whose area is at least 1% of the original
                # — taking only the largest polygon can discard significant
                # copper regions on complex layers.
                min_area = poly.area * 0.01
                keep = [g for g in cleaned.geoms if g.area >= min_area]
                if len(keep) == 1:
                    poly = keep[0]
                elif keep:
                    poly = max(keep, key=lambda g: g.area)

        # Simplify boundary to reduce vertex count and smooth out
        # micro-jaggedness from arc approximation in Gerber data.
        # Use smaller tolerance for complex PCBs to preserve edge details
        simpl_tol = max(0.005, self.config.maximum_size * 0.02)
        simplified = poly.simplify(simpl_tol, preserve_topology=True)
        if not simplified.is_empty and simplified.area > 1e-10:
            if simplified.geom_type == 'Polygon':
                poly = simplified
            elif simplified.geom_type == 'MultiPolygon':
                min_area = poly.area * 0.01
                keep = [g for g in simplified.geoms if g.area >= min_area]
                if len(keep) == 1:
                    poly = keep[0]
                elif keep:
                    poly = max(keep, key=lambda g: g.area)

        # For complex polygons (many boundary vertices), simplify to avoid
        # exceeding MAX_VERTICES and falling back to earcut which produces
        # degenerate elongated triangles.
        # 优化：降低边界顶点限制以减少内存使用，从 12000 降到 6000
        MAX_BOUNDARY_VERTS = 6000
        poly = self._simplify_if_needed(poly, MAX_BOUNDARY_VERTS)

        if _HAS_CDT:
            try:
                return self._cdt_triangulate(poly, seed_points)
            except Exception:
                pass

        try:
            return self._adaptive_triangulate(poly, seed_points)
        except Exception:
            return self._earcut_triangulate(poly)

    @staticmethod
    def _simplify_if_needed(poly, max_verts):
        """Simplify polygon boundary if vertex count exceeds max_verts.

        Uses binary search to find the minimum tolerance that reduces vertices
        to below max_verts, preserving as much boundary detail as possible.
        """
        n = len(poly.exterior.coords)
        for interior in poly.interiors:
            n += len(interior.coords)
        if n <= max_verts:
            return poly

        import math
        bounds = poly.bounds
        diag = math.hypot(bounds[2] - bounds[0], bounds[3] - bounds[1])

        # Binary search for optimal tolerance
        # Lower bound: very small tolerance (minimal simplification)
        # Upper bound: large tolerance (aggressive simplification)
        low_tol = diag * 0.0001
        high_tol = diag * 0.01  # 1% of diagonal

        best_result = poly

        # Binary search with more iterations for precision
        for _ in range(12):
            mid_tol = (low_tol + high_tol) / 2
            simplified = poly.simplify(mid_tol, preserve_topology=True)

            if simplified.is_empty or simplified.geom_type not in ('Polygon', 'MultiPolygon'):
                low_tol = mid_tol  # Tolerance too high, try lower
                continue

            if isinstance(simplified, shapely.geometry.MultiPolygon):
                simplified = max(simplified.geoms, key=lambda g: g.area)

            n2 = len(simplified.exterior.coords)
            for interior in simplified.interiors:
                n2 += len(interior.coords)

            if n2 <= max_verts:
                # This tolerance works, try to preserve more detail by going lower
                best_result = simplified
                high_tol = mid_tol
            else:
                # Still too many vertices, need higher tolerance
                low_tol = mid_tol

        return best_result

    @staticmethod
    def _enforce_min_edge(poly, min_len):
        """Merge consecutive boundary vertices closer than min_len.

        This directly removes the close-together vertex pairs that cause
        starburst degenerate triangles.  Unlike simplify() which only
        considers shape error, this enforces a hard minimum spacing
        between adjacent boundary vertices.
        """
        def _ring(coords, closed):
            """Filter a coordinate ring to enforce minimum edge length."""
            if len(coords) < 3:
                return list(coords)
            pts = [coords[0]]
            for i in range(1, len(coords)):
                dx = coords[i][0] - pts[-1][0]
                dy = coords[i][1] - pts[-1][1]
                d = math.hypot(dx, dy)
                # Keep the last point (closing vertex) regardless
                is_closing = (i == len(coords) - 1 and closed)
                if is_closing:
                    dx0 = coords[i][0] - pts[0][0]
                    dy0 = coords[i][1] - pts[0][1]
                    if math.hypot(dx0, dy0) < min_len and len(pts) > 2:
                        # Closing vertex too close to first — drop it,
                        # we'll re-close below
                        pass
                    else:
                        pts.append(coords[i])
                elif d >= min_len:
                    pts.append(coords[i])
            if closed:
                # Ensure ring is properly closed
                dx = pts[-1][0] - pts[0][0]
                dy = pts[-1][1] - pts[0][1]
                if math.hypot(dx, dy) > 1e-12:
                    pts.append(pts[0])
            return pts

        ext = _ring(poly.exterior.coords, closed=True)
        if len(ext) < 4:
            return poly
        holes = []
        for interior in poly.interiors:
            h = _ring(interior.coords, closed=True)
            if len(h) >= 4:
                holes.append(h)
        try:
            result = shapely.geometry.Polygon(ext, holes)
            if not result.is_valid:
                result = result.buffer(0)
            if result.is_empty or result.area < 1e-10:
                return poly
            return result
        except Exception:
            return poly

    def _refine_mesh(self, poly, mesh, min_angle_deg=20, max_iter=8):
        """Split thin triangles by inserting midpoints on longest edges.

        Converts the half-edge mesh → point/triangle arrays, iteratively
        finds triangles whose minimum angle < min_angle_deg, inserts the
        midpoint of the longest edge as a new Steiner point, re-runs
        Delaunay, and filters by polygon containment.  The mesh stays
        complete (no holes) because every removed thin triangle is
        replaced by smaller, better-shaped ones.
        """
        from scipy.spatial import Delaunay as ScipyDelaunay
        from shapely.prepared import prep

        # Safety: skip refinement for very large meshes to avoid timeout
        if len(mesh.vertices) > 80000:
            return mesh

        prepared = prep(poly)
        cos_thresh = math.cos(math.radians(min_angle_deg))

        # Extract points and triangles from half-edge mesh
        pts = [(v.p.x, v.p.y) for v in mesh.vertices]
        tris = []
        for face in mesh.faces:
            verts = list(face.vertices)
            if len(verts) == 3:
                tris.append((verts[0].i, verts[1].i, verts[2].i))
        if not tris:
            return mesh

        for _iter in range(max_iter):
            # Find thin triangles and collect Steiner points
            new_pts = []
            for tri in tris:
                p0, p1, p2 = pts[tri[0]], pts[tri[1]], pts[tri[2]]
                is_thin = False
                # Check each angle
                corners = [(p0, p1, p2), (p1, p2, p0), (p2, p0, p1)]
                for a, b, c in corners:
                    ab = math.hypot(b[0]-a[0], b[1]-a[1])
                    ac = math.hypot(c[0]-a[0], c[1]-a[1])
                    if ab < 1e-12 or ac < 1e-12:
                        continue
                    cos_a = ((b[0]-a[0])*(c[0]-a[0])+(b[1]-a[1])*(c[1]-a[1]))/(ab*ac)
                    if cos_a > cos_thresh:
                        # Insert midpoint of longest edge
                        edges = [
                            (math.hypot(p1[0]-p0[0], p1[1]-p0[1]), p0, p1),
                            (math.hypot(p2[0]-p1[0], p2[1]-p1[1]), p1, p2),
                            (math.hypot(p0[0]-p2[0], p0[1]-p2[1]), p2, p0),
                        ]
                        _, pa, pb = max(edges)
                        mid = ((pa[0]+pb[0])/2, (pa[1]+pb[1])/2)
                        new_pts.append(mid)
                        is_thin = True
                        break

            if not new_pts:
                break  # All triangles meet quality criterion

            # Add new Steiner points (deduplicated)
            seen = {(round(p[0], 3), round(p[1], 3)) for p in pts}
            added = 0
            for p in new_pts:
                key = (round(p[0], 3), round(p[1], 3))
                if key not in seen:
                    seen.add(key)
                    # Only add points inside the polygon
                    if prepared.contains(shapely.geometry.Point(p[0], p[1])):
                        pts.append(p)
                        added += 1
            if added == 0:
                break

            # Re-triangulate
            arr = np.array(pts)
            delaunay = ScipyDelaunay(arr)
            tris = []
            for s in delaunay.simplices:
                cx = arr[s, 0].mean()
                cy = arr[s, 1].mean()
                if prepared.contains(shapely.geometry.Point(float(cx), float(cy))):
                    a, b, c = int(s[0]), int(s[1]), int(s[2])
                    if a != b and b != c and c != a:
                        tris.append((a, b, c))

        # Rebuild half-edge mesh from refined triangles
        mesh_points = [Point(p[0], p[1]) for p in pts]
        return Mesh.from_triangle_soup(mesh_points, tris)

    def _cdt_triangulate(self, poly, seed_points):
        from scipy.spatial import KDTree
        from shapely.prepared import prep

        area = poly.area
        min_size = self.config.maximum_size
        max_size = min_size  # uniform mesh — no variable density
        min_dist = self.config.variable_density_min_distance
        max_dist = self.config.variable_density_max_distance
        MAX_VERTICES = max(50000, int(area / (min_size * min_size) * 1.5))
        MAX_VERTICES = min(MAX_VERTICES, 1000000)

        has_seeds = len(seed_points) > 0
        seed_tree = KDTree([(p.x, p.y) for p in seed_points]) if has_seeds else None

        def target_one(x, y):
            if not has_seeds:
                return max_size
            d = seed_tree.query([[x, y]])[0][0]
            t = min(1.0, max(0.0, (d - min_dist) / (max_dist - min_dist)))
            return min_size + t * (max_size - min_size)

        def subdivide(ax, ay, bx, by):
            length = math.hypot(bx - ax, by - ay)
            if length < 1e-12:
                return [(ax, ay)]
            mx, my = (ax + bx) / 2, (ay + by) / 2
            ts = target_one(mx, my)
            if length <= ts * 1.5:
                return [(ax, ay)]
            return subdivide(ax, ay, mx, my) + subdivide(mx, my, bx, by)

        # --- Collect densified boundary points per ring ---
        rings_pts = []  # list of list of (x, y) per ring
        for ring in [poly.exterior] + list(poly.interiors):
            coords = list(ring.coords)[:-1]
            n = len(coords)
            ring_pts = []
            for i in range(n):
                x1, y1 = coords[i]
                x2, y2 = coords[(i + 1) % n]
                ring_pts.extend(subdivide(x1, y1, x2, y2))
            rings_pts.append(ring_pts)

        # --- Deduplicate all points, build segment list ---
        seen = {}
        pts = []

        def add(x, y):
            key = (round(x, 3), round(y, 3))
            if key not in seen:
                seen[key] = len(pts)
                pts.append((float(x), float(y)))
            return seen[key]

        segments = []
        for ring_pts in rings_pts:
            indices = [add(x, y) for x, y in ring_pts]
            n = len(indices)
            for i in range(n):
                a, b = indices[i], indices[(i + 1) % n]
                if a != b:
                    segments.append((a, b))

        # --- Interior adaptive grid ---
        bounds = poly.bounds
        spacing = min_size
        if area / (spacing * spacing) > MAX_VERTICES * 0.6:
            spacing = math.sqrt(area / (MAX_VERTICES * 0.6))

        xs = np.arange(bounds[0], bounds[2] + spacing, spacing)
        ys = np.arange(bounds[1], bounds[3] + spacing, spacing)
        xx, yy = np.meshgrid(xs, ys, indexing='ij')
        xf, yf = xx.ravel(), yy.ravel()

        if has_seeds:
            dists = seed_tree.query(np.column_stack([xf, yf]))[0]
            t_arr = np.clip((dists - min_dist) / (max_dist - min_dist), 0.0, 1.0)
            targets = min_size + t_arr * (max_size - min_size)
            levels = np.maximum(1, np.round(targets / spacing)).astype(int)
            n_x, n_y = len(xs), len(ys)
            iix, iiy = np.meshgrid(np.arange(n_x), np.arange(n_y), indexing='ij')
            keep = (iix.ravel() % levels == 0) & (iiy.ravel() % levels == 0)
            cx, cy = xf[keep], yf[keep]
        else:
            cx, cy = xf, yf

        prepared = prep(poly)
        interior = [
            (float(x), float(y))
            for x, y in zip(cx, cy)
            if prepared.contains(shapely.geometry.Point(float(x), float(y)))
        ]

        for x, y in interior:
            add(x, y)
        for p in seed_points:
            add(p.x, p.y)

        if len(pts) > MAX_VERTICES or len(pts) < 3:
            raise MeshingException("Too many or too few vertices for CDT")

        # --- Build CDT ---
        cdt_verts = [_cdt.V2d(x, y) for x, y in pts]
        cdt_edges = [_cdt.Edge(a, b) for a, b in segments]

        t = _cdt.Triangulation(
            _cdt.VertexInsertionOrder.AS_PROVIDED,
            _cdt.IntersectingConstraintEdges.NOT_ALLOWED,
            1e-6
        )
        t.insert_vertices(cdt_verts)
        if cdt_edges:
            t.insert_edges(cdt_edges)
        t.erase_super_triangle()

        # --- Filter triangles by centroid containment ---
        verts_arr = np.array(pts)
        valid = []
        used_set = set()
        for tri in t.triangles:
            vi = tri.vertices
            cx = (verts_arr[vi[0], 0] + verts_arr[vi[1], 0] + verts_arr[vi[2], 0]) / 3
            cy = (verts_arr[vi[0], 1] + verts_arr[vi[1], 1] + verts_arr[vi[2], 1]) / 3
            if prepared.contains(shapely.geometry.Point(float(cx), float(cy))):
                a, b, c = int(vi[0]), int(vi[1]), int(vi[2])
                if a != b and b != c and c != a:
                    valid.append((a, b, c))
                    used_set.update([a, b, c])

        if not valid:
            raise MeshingException("CDT produced no valid triangles")

        # Remap to remove unused vertices
        used_list = sorted(used_set)
        old_to_new = {old: new for new, old in enumerate(used_list)}
        final_pts = [pts[i] for i in used_list]
        final_tri = [(old_to_new[a], old_to_new[b], old_to_new[c]) for a, b, c in valid]

        # Verify seed points survived
        if has_seeds:
            seed_keys = {(round(p.x, 3), round(p.y, 3)) for p in seed_points}
            final_keys = {(round(x, 3), round(y, 3)) for x, y in final_pts}
            if not seed_keys.issubset(final_keys):
                raise MeshingException("Seed points lost during CDT")

        mesh_points = [Point(x, y) for x, y in final_pts]
        return Mesh.from_triangle_soup(mesh_points, final_tri)

    def _adaptive_triangulate(self, poly, seed_points):
        from scipy.spatial import Delaunay, KDTree

        area = poly.area
        min_size = self.config.maximum_size
        max_size = min_size  # uniform mesh
        min_dist = self.config.variable_density_min_distance
        max_dist = self.config.variable_density_max_distance
        MAX_VERTICES = max(50000, int(area / (min_size * min_size) * 1.5))
        MAX_VERTICES = min(MAX_VERTICES, 1000000)

        has_seeds = len(seed_points) > 0
        seed_tree = KDTree([(p.x, p.y) for p in seed_points]) if has_seeds else None

        def target_vec(xx, yy):
            if not has_seeds:
                return np.full(len(xx), max_size, dtype=float)
            dists = seed_tree.query(np.column_stack([xx, yy]))[0]
            t = np.clip((dists - min_dist) / (max_dist - min_dist), 0.0, 1.0)
            return min_size + t * (max_size - min_size)

        def target_one(x, y):
            if not has_seeds:
                return max_size
            d = seed_tree.query([[x, y]])[0][0]
            t = min(1.0, max(0.0, (d - min_dist) / (max_dist - min_dist)))
            return min_size + t * (max_size - min_size)

        # Densify boundary by recursive edge subdivision
        def subdivide(ax, ay, bx, by):
            length = math.hypot(bx - ax, by - ay)
            if length < 1e-12:
                return [(ax, ay)]
            mx, my = (ax + bx) / 2, (ay + by) / 2
            ts = target_one(mx, my)
            if length <= ts * 1.5:
                return [(ax, ay)]
            return subdivide(ax, ay, mx, my) + subdivide(mx, my, bx, by)

        boundary = []
        for ring in [poly.exterior] + list(poly.interiors):
            coords = list(ring.coords)[:-1]
            n = len(coords)
            for i in range(n):
                x1, y1 = coords[i]
                x2, y2 = coords[(i + 1) % n]
                boundary.extend(subdivide(x1, y1, x2, y2))

        # Interior adaptive grid
        bounds = poly.bounds
        spacing = min_size
        if area / (spacing * spacing) > MAX_VERTICES * 0.6:
            spacing = math.sqrt(area / (MAX_VERTICES * 0.6))

        xs = np.arange(bounds[0], bounds[2] + spacing, spacing)
        ys = np.arange(bounds[1], bounds[3] + spacing, spacing)
        n_x, n_y = len(xs), len(ys)

        xx, yy = np.meshgrid(xs, ys, indexing='ij')
        xf, yf = xx.ravel(), yy.ravel()

        targets = target_vec(xf, yf)
        levels = np.maximum(1, np.round(targets / spacing)).astype(int)

        iix, iiy = np.meshgrid(np.arange(n_x), np.arange(n_y), indexing='ij')
        keep = (iix.ravel() % levels == 0) & (iiy.ravel() % levels == 0)

        cx, cy = xf[keep], yf[keep]

        from shapely.prepared import prep
        prepared = prep(poly)

        interior = [
            (float(x), float(y))
            for x, y in zip(cx, cy)
            if prepared.contains(shapely.geometry.Point(float(x), float(y)))
        ]

        # Merge boundary + interior + seeds, deduplicate
        seen = {}
        pts = []

        def add(x, y):
            key = (round(x, 3), round(y, 3))
            if key not in seen:
                seen[key] = len(pts)
                pts.append((float(x), float(y)))

        for x, y in boundary:
            add(x, y)
        for x, y in interior:
            add(x, y)
        for p in seed_points:
            add(p.x, p.y)

        if len(pts) > MAX_VERTICES or len(pts) < 3:
            return self._earcut_triangulate(poly)

        arr = np.array(pts)
        tri = Delaunay(arr)

        valid = []
        used_set = set()
        for s in tri.simplices:
            centroid = shapely.geometry.Point(
                float(arr[s, 0].mean()), float(arr[s, 1].mean())
            )
            if prepared.contains(centroid):
                a, b, c = int(s[0]), int(s[1]), int(s[2])
                if a != b and b != c and c != a:
                    area = abs(
                        (pts[b][0] - pts[a][0]) * (pts[c][1] - pts[a][1])
                        - (pts[c][0] - pts[a][0]) * (pts[b][1] - pts[a][1])
                    )
                    if area > 1e-10:
                        valid.append((a, b, c))
                        used_set.update([a, b, c])

        if not valid:
            return self._earcut_triangulate(poly)

        # Remap to remove isolated vertices
        used_list = sorted(used_set)
        old_to_new = {old: new for new, old in enumerate(used_list)}
        final_pts = [pts[i] for i in used_list]
        final_tri = [(old_to_new[a], old_to_new[b], old_to_new[c]) for a, b, c in valid]

        # Verify seed points survived the clipping
        if has_seeds:
            seed_keys = {(round(p.x, 3), round(p.y, 3)) for p in seed_points}
            final_keys = {(round(x, 3), round(y, 3)) for x, y in final_pts}
            if not seed_keys.issubset(final_keys):
                return self._earcut_triangulate(poly)

        mesh_points = [Point(x, y) for x, y in final_pts]
        return Mesh.from_triangle_soup(mesh_points, final_tri)

    def _earcut_triangulate(self, poly):
        import trimesh

        try:
            vertices, faces = trimesh.creation.triangulate_polygon(poly, engine='earcut')
        except Exception:
            try:
                vertices, faces = trimesh.creation.triangulate_polygon(
                    poly.buffer(0), engine='earcut'
                )
            except Exception:
                return Mesh()

        if len(faces) == 0:
            return Mesh()

        unique_map = {}
        remap = {}
        unique_verts = []
        for i in range(len(vertices)):
            key = (round(float(vertices[i][0]), 4), round(float(vertices[i][1]), 4))
            if key in unique_map:
                remap[i] = unique_map[key]
            else:
                new_idx = len(unique_verts)
                unique_map[key] = new_idx
                unique_verts.append(vertices[i])
                remap[i] = new_idx

        triangles = []
        for face in faces:
            tri = tuple(remap[int(face[i])] for i in range(3))
            if tri[0] != tri[1] and tri[1] != tri[2] and tri[2] != tri[0]:
                triangles.append(tri)

        if not triangles:
            return Mesh()

        mesh_points = [Point(float(v[0]), float(v[1])) for v in unique_verts]
        mesh = Mesh.from_triangle_soup(mesh_points, triangles)

        # Laplacian smoothing: move each interior vertex to the average
        # of its neighbors.  This rounds out degenerate spikes without
        # removing triangles (keeps the mesh complete).
        for _ in range(3):
            new_pos = {}
            for vertex in mesh.vertices:
                # Only smooth interior vertices (those not on the boundary)
                if vertex.out is None:
                    continue
                is_boundary = False
                neighbors = []
                for edge in vertex.orbit():
                    if edge.is_boundary:
                        is_boundary = True
                        break
                    neighbors.append(edge.twin.origin)
                if is_boundary or not neighbors:
                    continue
                nx = sum(n.p.x for n in neighbors) / len(neighbors)
                ny = sum(n.p.y for n in neighbors) / len(neighbors)
                new_pos[vertex.i] = (nx, ny)
            for vi, (nx, ny) in new_pos.items():
                mesh.vertices.to_object(vi).p = Point(nx, ny)

        return mesh


Mesher.Config.RELAXED = Mesher.Config(
    minimum_angle=5.0,
    maximum_size=0,
    variable_size_maximum_factor=1.0
)

<script type="text/plain" id="file-problem-py">"""
problem.py - Data structures for PCB PDN analysis problems.

This module defines the core data structures that are passed to the mesher
and FEM solver. It represents:
- Copper layers (Layer)
- Electrical networks (Network)
- Lumped elements (Resistor, VoltageSource, CurrentSource, VoltageRegulator)
- The complete problem definition (Problem)

All classes are frozen dataclasses for immutability and hashability.
"""

from __future__ import annotations

import shapely.geometry
from dataclasses import dataclass, field
from typing import Any


@dataclass(frozen=True, slots=True)
class Layer:
    """
    Represents a single copper layer of the input circuit board.

    Attributes:
        shape: MultiPolygon representing all copper regions on this layer.
        name: Human-readable layer name (e.g., "Top", "Bottom", "Inner Layer 1").
        conductance: Conductance in Siemens (conductivity * thickness).

    The individual polygons are cached in the .geoms field to avoid expensive
    Shapely copying when accessing them repeatedly.
    """
    shape: shapely.geometry.MultiPolygon
    name: str
    conductance: float  # Siemens = conductivity [S/mm] * thickness [mm]

    # Cached tuple of individual polygons, extracted from shape
    geoms: tuple[shapely.geometry.Polygon, ...] = field(init=False, repr=False)

    def __post_init__(self) -> None:
        # Extract individual polygons from MultiPolygon and cache them.
        # This avoids expensive Shapely copying on repeated .geoms access.
        object.__setattr__(self, 'geoms', tuple(self.shape.geoms))

    def __hash__(self) -> int:
        # Custom hash since Layer contains unhashable Shapely objects
        return hash((id(self.shape), self.name, self.conductance))


@dataclass(frozen=True, slots=True)
class NodeID:
    """
    Opaque identifier for a node in the electrical network.

    NodeIDs are used to reference specific connection points in the network,
    such as pad connections or via terminals. They are compared by identity
    (object id) rather than value, making them truly opaque.
    """
    def __eq__(self, other: object) -> bool:
        # Force identity comparison, not value comparison.
        # This prevents all instances from being considered equal.
        return self is other

    def __hash__(self) -> int:
        # Hash based on identity, consistent with __eq__
        return id(self)


@dataclass(frozen=True, slots=True)
class Connection:
    """
    Represents a connection between an internal node of the Network and
    a point on a copper layer.

    Attributes:
        layer: The Layer this connection is on.
        point: The shapely Point location on the layer.
        node_id: The NodeID for this connection (auto-generated if not provided).
    """
    layer: Layer
    point: shapely.geometry.Point
    node_id: NodeID = field(default_factory=NodeID)


@dataclass(frozen=True)
class BaseLumped:
    """
    Base class for all lumped elements in the network.

    Lumped elements are discrete components (resistors, sources, etc.)
    that connect two or more nodes in the network.
    """
    def __post_init__(self) -> None:
        if not self.terminals:
            raise AssertionError("Lumped elements must have terminals")

    @property
    def terminals(self) -> list[NodeID]:
        """Return the list of NodeIDs connected to this element."""
        ...

    @property
    def is_source(self) -> bool:
        """Return True if this element is a voltage/current source."""
        return False

    @property
    def extra_variable_count(self) -> int:
        """
        Return the number of extra variables needed for this element.

        Most elements need 0, but voltage sources need 1 extra variable
        for the current through the source.
        """
        return 0


@dataclass(frozen=True, slots=True)
class Network:
    """
    Represents an electrical network consisting of connections and elements.

    A Network groups together:
    - Connections: points where the network connects to copper layers
    - Elements: lumped elements (resistors, sources, etc.) between nodes

    Attributes:
        connections: List of Connection objects.
        elements: List of BaseLumped elements.
        nodes: Mapping from NodeID to integer index (computed in __post_init__).
        has_source: True if any element is a voltage/current source.

    The network is validated during construction:
    - All element terminals must be NodeID instances
    - All connections must connect to at least one element
    """
    connections: list[Connection]
    elements: list[BaseLumped]
    nodes: dict[NodeID, int] = field(init=False, repr=False)
    has_source: bool = field(init=False, repr=False)

    def __post_init__(self) -> None:
        # Collect all unique nodes from elements
        node_set: set[NodeID] = set()
        for element in self.elements:
            for terminal in element.terminals:
                if not isinstance(terminal, NodeID):
                    raise TypeError(f"Terminal must be a NodeID, got {type(terminal)}")
                node_set.add(terminal)

        # If no elements, there should be no connections either
        if not node_set and self.connections:
            raise ValueError("Network with connections must have at least one element")

        # Validate connections: each must connect to a node in this network
        for connection in self.connections:
            if connection.node_id not in node_set:
                raise ValueError(
                    f"Connection node {connection.node_id} not found in any element terminal. "
                    "Floating connections are not allowed."
                )

        # Build node-to-index mapping
        keys = list(node_set)
        nodes = {key: i for i, key in enumerate(keys)}
        object.__setattr__(self, "nodes", nodes)

        # Check if network contains any source elements
        has_source = any(element.is_source for element in self.elements)
        object.__setattr__(self, "has_source", has_source)


@dataclass(frozen=True, slots=True)
class Resistor(BaseLumped):
    """
    A resistor between two nodes.

    Attributes:
        a: First node terminal.
        b: Second node terminal.
        resistance: Resistance in ohms (must be positive).
    """
    a: NodeID
    b: NodeID
    resistance: float

    def __post_init__(self) -> None:
        super().__post_init__()
        if self.resistance <= 0:
            raise ValueError(f"Resistance must be positive, got {self.resistance}")

    @property
    def terminals(self) -> list[NodeID]:
        return [self.a, self.b]


@dataclass(frozen=True, slots=True)
class VoltageSource(BaseLumped):
    """
    An ideal voltage source between two nodes.

    Attributes:
        p: Positive terminal node.
        n: Negative terminal node.
        voltage: Voltage in volts.

    The voltage source maintains V_p - V_n = voltage.
    Requires one extra variable for the current through the source.
    """
    p: NodeID
    n: NodeID
    voltage: float

    @property
    def terminals(self) -> list[NodeID]:
        return [self.p, self.n]

    @property
    def is_source(self) -> bool:
        return True

    @property
    def extra_variable_count(self) -> int:
        return 1


@dataclass(frozen=True, slots=True)
class CurrentSource(BaseLumped):
    """
    An ideal current source between two nodes.

    Attributes:
        f: "From" node (current flows from this node).
        t: "To" node (current flows to this node).
        current: Current in amperes.

    The current source forces a constant current from f to t.
    """
    f: NodeID
    t: NodeID
    current: float

    @property
    def terminals(self) -> list[NodeID]:
        return [self.f, self.t]

    @property
    def is_source(self) -> bool:
        return True


@dataclass(frozen=True, slots=True)
class VoltageRegulator(BaseLumped):
    """
    A voltage regulator with sense terminals.

    This models a regulator that maintains:
    V(v_p) - V(v_n) = voltage + gain * (V(s_f) - V(s_t))

    Attributes:
        v_p: Voltage positive sense terminal.
        v_n: Voltage negative sense terminal.
        s_f: Sense feedback "from" terminal.
        s_t: Sense feedback "to" terminal.
        voltage: Base output voltage.
        gain: Feedback gain (sense terminal contribution).

    Requires one extra variable for the regulator current.
    """
    v_p: NodeID
    v_n: NodeID
    s_f: NodeID
    s_t: NodeID
    voltage: float
    gain: float

    @property
    def terminals(self) -> list[NodeID]:
        return [self.v_p, self.v_n, self.s_f, self.s_t]

    @property
    def is_source(self) -> bool:
        return True

    @property
    def extra_variable_count(self) -> int:
        return 1


@dataclass(frozen=True, slots=True)
class Problem:
    """
    The complete PCB PDN analysis problem.

    A Problem contains:
    - All copper layers to analyze
    - All electrical networks (voltage sources, loads, via networks)
    - Optional project name for identification

    Attributes:
        layers: List of Layer objects representing copper layers.
        networks: List of Network objects representing electrical connections.
        project_name: Optional human-readable project identifier.

    This is the top-level data structure passed to the FEM solver.
    """
    layers: list[Layer]
    networks: list[Network]
    project_name: str | None = None


# Export public symbols
__all__ = [
    'Layer',
    'NodeID',
    'Connection',
    'BaseLumped',
    'Network',
    'Resistor',
    'VoltageSource',
    'CurrentSource',
    'VoltageRegulator',
    'Problem',
]

<script type="text/plain" id="file-solver_enhanced-py">"""
solver_enhanced_standalone.py - Standalone enhanced FEM solver with memory optimization and robust meshing.

This module provides a complete, self-contained implementation of the FEM solver
with the following enhancements:
- CompactMesh for memory-efficient storage
- Vectorized power/current computation
- Fallback mesh generation for problematic geometries
- Adaptive mesh scaling based on board size
- COO matrix construction for lower memory usage
- Tolerance-aware connectivity checks

This is a standalone implementation that does not depend on solver.py.
"""

import gc
import itertools
import logging
import math
import numpy as np
import scipy.sparse
import scipy.spatial
import shapely
import shapely.geometry
import warnings
from dataclasses import dataclass, field
from typing import Optional

# Import problem module and mesh module
import problem
import mesh_pure as mesh


log = logging.getLogger(__name__)


DTYPE = np.float64


# ============================================================
# Base Classes and Data Structures
# ============================================================

class SolverWarning(Warning):
    """
    A warning that is raised by the solver when it encounters a problem
    that does not prevent it from solving the problem, but may indicate
    a potential issue with the problem definition.
    """
    pass


@dataclass(frozen=True)
class SolverInfo:
    """Diagnostic information from the solver."""
    ground_node_current: float  # Should be ~0 for well-posed problems
    residual_norm: float        # ||L @ v - r||, should be ~0 for solved systems


@dataclass
class CompactMesh:
    """Lightweight mesh data — vertex positions + triangle connectivity as numpy arrays."""
    vertex_xy: np.ndarray   # (N, 2) float64
    triangles: np.ndarray   # (M, 3) int32

    def extract_boundaries(self) -> list[dict]:
        """Extract boundary polygons from the mesh using numpy for memory efficiency.

        Memory-optimized algorithm using numpy arrays instead of Python dicts.
        Reduces memory usage by ~85% for large meshes.

        Returns:
            List of boundary dicts with 'exterior' and 'holes' coordinate lists.
        """
        if len(self.triangles) == 0:
            return []

        n_tris = len(self.triangles)

        # Step 1: Extract all edges into numpy arrays (memory-efficient)
        # Each triangle has 3 edges, total 3*n_tris edges
        edge_v1 = np.empty(n_tris * 3, dtype=np.int32)
        edge_v2 = np.empty(n_tris * 3, dtype=np.int32)

        idx = 0
        for tri in self.triangles:
            v0, v1, v2 = int(tri[0]), int(tri[1]), int(tri[2])
            # Three edges per triangle, ensure v1 < v2 for consistency
            edges = [(v0, v1), (v1, v2), (v2, v0)]
            for a, b in edges:
                if a < b:
                    edge_v1[idx], edge_v2[idx] = a, b
                else:
                    edge_v1[idx], edge_v2[idx] = b, a
                idx += 1

        # Step 2: Sort edges to group identical edges together
        # Create sort key: v1 * (max_v + 1) + v2
        max_v = max(np.max(edge_v1), np.max(edge_v2)) if idx > 0 else 0
        sort_keys = edge_v1[:idx] * (max_v + 1) + edge_v2[:idx]
        sorted_order = np.argsort(sort_keys)

        # Step 3: Count occurrences and identify boundary edges (count == 1)
        boundary_from = []
        boundary_to = []

        i = 0
        while i < idx:
            j = i
            # Find end of identical edge group
            while j < idx and sort_keys[sorted_order[j]] == sort_keys[sorted_order[i]]:
                j += 1

            # If only one occurrence, it's a boundary edge
            if j - i == 1:
                edge_idx = sorted_order[i]
                boundary_from.append(edge_v1[edge_idx])
                boundary_to.append(edge_v2[edge_idx])

            i = j

        if not boundary_from:
            return []

        # Step 4: Build adjacency (only for boundary vertices)
        adj = {}
        for v1, v2 in zip(boundary_from, boundary_to):
            adj.setdefault(v1, []).append(v2)
            adj.setdefault(v2, []).append(v1)

        # Step 5: Walk boundary rings
        rings = []
        visited = set()

        for start in adj:
            if start in visited:
                continue

            ring = []
            current = start
            prev = -1

            while current != -1 and current not in visited:
                visited.add(current)
                ring.append(current)

                neighbors = adj.get(current, [])
                next_candidates = [v for v in neighbors if v != prev]
                if not next_candidates:
                    break
                prev, current = current, next_candidates[0]

            if len(ring) >= 3:
                rings.append(ring)

        # Step 6: Convert to coordinates and classify by winding direction
        def signed_area(ring_verts):
            """Calculate signed area using shoelace formula."""
            area = 0.0
            n = len(ring_verts)
            for i in range(n):
                x1, y1 = self.vertex_xy[ring_verts[i]]
                x2, y2 = self.vertex_xy[ring_verts[(i + 1) % n]]
                area += x1 * y2 - x2 * y1
            return area / 2.0

        exterior_rings = []
        hole_rings = []

        for ring_verts in rings:
            if len(ring_verts) < 3:
                continue

            coords = [(float(self.vertex_xy[v][0]), float(self.vertex_xy[v][1])) for v in ring_verts]

            # Remove closing point if duplicated
            if coords[-1] == coords[0]:
                coords.pop()

            if len(coords) < 3:
                continue

            area = signed_area(ring_verts)
            if area > 0:
                exterior_rings.append(coords)
            else:
                hole_rings.append(coords)

        # Step 7: Pair exteriors with holes
        polygons = []
        if exterior_rings:
            for ext in exterior_rings:
                polygons.append({'exterior': ext, 'holes': list(hole_rings)})
        elif hole_rings:
            for hole in hole_rings:
                polygons.append({'exterior': hole, 'holes': []})

        return polygons


@dataclass
class LayerSolution:
    """Layer solution using compact mesh data."""
    compact_meshes: list[CompactMesh]
    potentials: list[np.ndarray]
    power_densities: list[np.ndarray] = field(default_factory=list)
    current_densities: list[list[list[float]]] = field(default_factory=list)
    disconnected_compact: list[CompactMesh] = field(default_factory=list)


@dataclass
class Solution:
    """Solution object using compact layer solutions."""
    problem: problem.Problem
    layer_solutions: list[LayerSolution]
    solver_info: SolverInfo
    # Original polygon geometries (for boundary extraction later)
    original_geometries: list[list[shapely.geometry.Polygon]] = field(default_factory=list)


# ============================================================
# Utility Functions
# ============================================================

def construct_strtrees_from_layers(layers: list[problem.Layer]
                                   ) -> list[shapely.strtree.STRtree]:
    """
    Construct STRtrees for each layer in the problem.

    Args:
        layers: List of layers to construct STRtrees for

    Returns:
        List of STRtrees, one for each layer
    """
    strtrees = []
    for layer in layers:
        strtree = shapely.strtree.STRtree(layer.geoms)
        strtrees.append(strtree)
    return strtrees


def collect_seed_points(problem: problem.Problem, layer: problem.Layer) -> list[mesh.Point]:
    """
    Collect all seed points (component pads) that are on this layer.

    Args:
        problem: The entire problem containing all lumped elements
        layer: The specific layer to collect seed points for

    Returns:
        List of Points to be used as mesh seed points
    """
    seed_points = []
    for network in problem.networks:
        for conn in network.connections:
            # Check if this connection is on our layer
            if conn.layer == layer:
                seed_points.append(mesh.Point(conn.point.x, conn.point.y))
    return seed_points


def laplace_operator(mesh_obj: mesh.Mesh) -> scipy.sparse.coo_matrix:
    """
    Compute the Laplace operator for a given mesh. This is in "mesh-local"
    indices, so the variable indices are given by the mesh.vertices indices.
    """
    N = len(mesh_obj.vertices)

    row_is = []
    col_is = []
    values = []
    diagonal_entries = np.zeros(N, dtype=DTYPE)

    for i, vertex_i in enumerate(mesh_obj.vertices):
        for edge in vertex_i.orbit():
            ratio = edge.cotan()

            if ratio == 0:
                # I do not think this happens all that often, except for maybe
                # some degenerate cases
                continue

            vertex_k = edge.twin.origin
            k = mesh_obj.vertices.to_index(vertex_k)

            # Note that we are iterating over everything, so the (k, i) pair gets
            # set in a different iteration
            # The below is equivalent to:
            # L[i, i] -= ratio
            # L[i, k] += ratio
            row_is.append(i)
            col_is.append(k)
            values.append(ratio)
            diagonal_entries[i] -= ratio

    # Insert the diagonal entries
    for i, val in enumerate(diagonal_entries):
        row_is.append(i)
        col_is.append(i)
        values.append(val)

    L = scipy.sparse.coo_matrix((values, (row_is, col_is)), shape=(N, N), dtype=DTYPE)

    return L


def compute_triangle_gradient(vertices: list[mesh.Vertex],
                              values: list[float]) -> mesh.Vector:
    """
    Compute the gradient of a function that is a linear interpolation of the
    values at the vertices of a triangle.
    """
    if len(vertices) != 3 or len(values) != 3:
        raise ValueError("Vertices and values must be of length 3 for a triangle")
    # Ugh. This is all veeeeery adhoc.
    # The magical keywords here are
    # * Finite Element Exterior Calculus
    # * Whitney Forms
    # * Nedelec elements
    # So, ultimately, this should all be implemented in mesh.py and we would just
    # like take the exterior derivative and have the interpolant etc.
    # However, for now, I want to get a simple solution and get the more
    # complicated stuff going later.
    v1, v2, v3 = vertices
    x1, y1 = v1.p.x, v1.p.y
    x2, y2 = v2.p.x, v2.p.y
    x3, y3 = v3.p.x, v3.p.y
    f1, f2, f3 = values

    def interpolate(x, y) -> float:
        # Barycentric coordinates
        D = (y2 - y3) * (x1 - x3) + (x3 - x2) * (y1 - y3)
        l1 = ((y2 - y3) * (x - x3) + (x3 - x2) * (y - y3)) / D
        l2 = ((y3 - y1) * (x - x3) + (x1 - x3) * (y - y3)) / D
        l3 = 1 - l1 - l2
        return l1 * f1 + l2 * f2 + l3 * f3

    # Since this is a linear interpolation, the gradient is just equal to the
    # difference quotient
    partial_x = interpolate(x1 + 1, y1) - f1
    partial_y = interpolate(x1, y1 + 1) - f1
    # TODO: mesh.Vector is semantically not quite the right type here
    return mesh.Vector(partial_x, partial_y)


def _is_point_in_or_on_boundary(geom: shapely.geometry.Polygon,
                                 point: shapely.geometry.Point,
                                 tol: float = 1e-6) -> bool:
    """
    Check if a point is inside a polygon or on its boundary.

    Uses a tiny buffer to handle numerical precision issues and points
    exactly on the boundary (e.g., pads on copper edge).
    """
    if geom.contains(point):
        return True
    return geom.buffer(tol).contains(point)


# ============================================================
# VertexIndexer
# ============================================================

@dataclass
class VertexIndexer:
    global_index_to_vertex_index: list[tuple[int, int]] = field(default_factory=list)
    mesh_vertex_index_to_global_index: dict[tuple[int, int], int] = field(default_factory=dict)

    @classmethod
    def create(cls, meshes: list[mesh.Mesh]) -> "VertexIndexer":
        vindex = cls()
        for mesh_idx, msh in enumerate(meshes):
            for vertex_idx, _ in enumerate(msh.vertices):
                global_index = len(vindex.global_index_to_vertex_index)
                vindex.global_index_to_vertex_index.append((mesh_idx, vertex_idx))
                vindex.mesh_vertex_index_to_global_index[(mesh_idx, vertex_idx)] = global_index
        return vindex


# ============================================================
# ConnectivityGraph
# ============================================================

@dataclass
class ConnectivityGraph:
    """Enhanced connectivity graph with intersection tolerance."""
    nodes: list["Node"] = field(default_factory=list)

    # Tolerance for point↔polygon intersection checks (mil).
    # Gerber→EasyEDA coordinate transforms can have sub-mil rounding errors
    # that cause via points to land slightly outside copper polygons.
    INTERSECTION_TOLERANCE = 0.05

    @dataclass(eq=False)
    class Node:
        layer_i: int  # Index of the layer in the Problem
        geom_i: int   # Index of this particular polygon in the layer.geoms tuple
        is_root: bool = False
        neighbors: set["ConnectivityGraph.Node"] = field(default_factory=set)

    @classmethod
    def _point_hits_geom(cls, geom, point) -> bool:
        """Check if point is on or near geom (within INTERSECTION_TOLERANCE)."""
        if geom.intersects(point):
            return True
        # Fallback: distance check for points just outside the boundary
        try:
            return geom.distance(point) <= cls.INTERSECTION_TOLERANCE
        except Exception:
            return False

    @classmethod
    def create_from_problem(cls,
                            problem: problem.Problem,
                            strtrees: list[shapely.strtree.STRtree]) -> "ConnectivityGraph":
        """Create connectivity graph with tolerance-aware intersection."""
        # First, we construct Node objects for ever layer geometry in the layers
        # that is, a list nodes_by_layers[layer_i][geom_i] gives us the
        # Node that coresponds to the layer_i-th layers geom_i-th geometry
        # object.
        nodes_by_layers = []
        for layer_i, layer in enumerate(problem.layers):
            nodes_by_layers.append(
                [cls.Node(layer_i=layer_i, geom_i=geom_i)
                 for geom_i, geom in enumerate(layer.geoms)]
            )

        # And finally, we walk through each of the networks, figure out
        # which Nodes are connected to each of the Connection and then
        # consider those Nodes connected to each other.
        for network in problem.networks:
            nodes_in_this_network = []
            for conn in network.connections:
                # Find the layer index for this connection
                layer_i = problem.layers.index(conn.layer)
                kdtree = strtrees[layer_i]

                # Find the closest vertex to this connection
                candidates = kdtree.query(conn.point)

                for geom_i in candidates:
                    # Use tolerance-aware intersection check
                    if not cls._point_hits_geom(conn.layer.geoms[geom_i], conn.point):
                        continue
                    intersecting_node = nodes_by_layers[layer_i][geom_i]
                    nodes_in_this_network.append(intersecting_node)

                    if network.has_source:
                        intersecting_node.is_root = True

            # Wire the nodes together
            for node_a, node_b in itertools.combinations(nodes_in_this_network, 2):
                node_a.neighbors.add(node_b)
                node_b.neighbors.add(node_a)

        # And finally flatten the list of nodes into a single list
        nodes = [
            node for xs in nodes_by_layers for node in xs
        ]

        return cls(nodes=nodes)

    def compute_connected_nodes(self) -> list[Node]:
        """
        Return a list of all nodes that are either root nodes themselves
        or are connected to a root node via any connection.
        """
        open_set = set([n for n in self.nodes if n.is_root])
        closed_set = set()

        while open_set:
            node = open_set.pop()
            closed_set.add(node)
            for neighbor in node.neighbors:
                if neighbor not in closed_set:
                    open_set.add(neighbor)

        return list(closed_set)


def find_connected_layer_geom_indices(connectivity_graph: ConnectivityGraph
                                      ) -> set[tuple[int, int]]:
    connected_nodes = connectivity_graph.compute_connected_nodes()

    layer_mesh_pairs = set()
    for node in connected_nodes:
        layer_i = node.layer_i
        geom_i = node.geom_i
        layer_mesh_pairs.add((layer_i, geom_i))

    return layer_mesh_pairs
